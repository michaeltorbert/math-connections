<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Math Connections — a friendly addition/subtraction fact-family game for young children.">
<title>Math Connections</title>
<style>
/* =========================================================================
   Math Connections — single-file kids' math app (add <-> subtract fact families)
   Plain HTML/CSS/vanilla JS. No build step. Works offline (double-click) and
   on GitHub Pages. Tuned for a 6-year-old on a tablet or laptop.
   ========================================================================= */

:root{
  --ink:#10233f; --ink-soft:#4b647f;
  --page:#f3f6f0;
  --panel:#fffefa;
  --line:#d8e2ee;
  --blue:#1268e3; --blue-d:#0f4fae;
  --green:#159c6e; --green-d:#08794e;
  --purple:#7c3aed; --purple-d:#5b21b6;
  --orange:#d97706; --orange-d:#92400e;
  --pink:#db2777; --pink-d:#9d174d;
  --amber:#f59e0b;
  --red:#dc2626; --red-d:#991b1b;
  --teal:#0f766e; --teal-d:#115e59;
  --yellow:#ca8a04; --yellow-d:#854d0e;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;color:var(--ink);
  font-family:Arial,"Helvetica Neue",Helvetica,sans-serif}
body{min-height:100dvh;display:flex;align-items:flex-start;justify-content:center;
  background:linear-gradient(180deg,#f7f8f2 0%,var(--page) 100%);padding:18px;-webkit-user-select:none;user-select:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:disabled{cursor:default}

#app{width:100%;max-width:760px;margin:0 auto}

/* ---------- generic building blocks ---------- */
.card{background:var(--panel);border-radius:8px;padding:24px;
  box-shadow:0 2px 0 rgba(15,35,63,0.08),0 10px 24px rgba(15,35,63,0.08);border:1px solid rgba(15,35,63,0.08)}
.center{text-align:center}
.row{display:flex;align-items:center;gap:12px}
.row.wrap{flex-wrap:wrap}
.spread{justify-content:space-between}
.muted{color:var(--ink-soft)}
.hidden{display:none !important}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-weight:700;border-radius:6px;padding:11px 20px;font-size:clamp(16px,3vw,19px);
  color:#fff;background:var(--blue);box-shadow:none;border:1px solid rgba(15,35,63,0.14);
  transition:background .12s,transform .12s}
.btn:active{transform:translateY(1px)}
.btn.green{background:var(--green)}
.btn.amber{background:#f8fafc;color:var(--ink);border-color:#cbd5e1}
.btn.purple{background:var(--purple)}
.btn.ghost{background:#eef6ff;color:var(--blue-d)}
.btn.big{padding:14px 30px;font-size:clamp(19px,3.8vw,24px);border-radius:7px}
.btn.sm{padding:8px 12px;font-size:clamp(13px,2.5vw,15px);border-radius:6px}
.btn:disabled{filter:grayscale(.5) opacity(.65)}

.linkbtn{background:none;color:var(--blue-d);font-weight:700;text-decoration:underline;
  font-size:clamp(14px,2.8vw,17px);padding:6px 4px}

/* ---------- header ---------- */
.appbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0}
.brand{font-weight:800;font-size:clamp(22px,5vw,30px);letter-spacing:0;color:var(--blue-d)}
.brand .x{color:var(--orange)}
.pill{display:inline-flex;align-items:center;gap:8px;background:#fff;border-radius:6px;
  padding:8px 12px;font-weight:700;border:1px solid #dbeafe}

/* ---------- home ---------- */
.hero{text-align:center;padding:8px 6px 4px}
.hero .big-emoji{display:none}
.hero h1{font-size:clamp(26px,6vw,36px);font-weight:800;color:var(--blue-d);margin:6px 0 4px}
.hero p{font-size:clamp(15px,3.6vw,18px);color:var(--ink-soft);font-weight:600}
.levelpick{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:14px 0 4px}
.levelbtn{background:#eff6ff;color:var(--blue-d);font-weight:700;border-radius:6px;
  padding:10px 16px;font-size:clamp(15px,3.4vw,18px);border:1px solid #bfdbfe}
.levelbtn.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.levelbtn .sub{display:block;font-size:.72em;font-weight:700;opacity:.85}

/* ---------- play ---------- */
.story{font-size:clamp(22px,4.5vw,30px);font-weight:800;text-align:center;line-height:1.32;
  margin:8px auto 18px;max-width:640px}
.story .em{color:var(--orange-d)}
.progress-dots{display:flex;gap:7px;justify-content:center;margin:2px 0 10px}
.progress-dots i{width:14px;height:14px;border-radius:50%;background:#cbd5e1;display:inline-block}
.progress-dots i.done{background:var(--green)}
.progress-dots i.now{background:var(--amber);transform:scale(1.25)}

/* equation practice */
.picture-model{display:flex;gap:12px;justify-content:center;align-items:center;margin:0 auto 18px;min-height:54px;flex-wrap:wrap}
.picture-model.whole-frame{border:2px solid #fbbf24;background:#fffbeb;border-radius:8px;padding:12px 14px;position:relative}
.picture-model.whole-frame::after{content:"Whole";position:absolute;right:10px;top:-11px;background:#fffbeb;color:#92400e;
  font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:1px 6px}
.picture-group{display:flex;gap:6px;align-items:center;justify-content:center;flex-wrap:wrap;max-width:260px}
.picture-group.labeled{border:1px dashed #cbd5e1;border-radius:8px;padding:10px 12px;position:relative;background:#fff}
.picture-group.labeled::after{content:"Part";position:absolute;left:8px;top:-10px;background:#fff;color:var(--ink-soft);
  font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:1px 5px}
.dot{width:22px;height:22px;border-radius:50%;display:inline-block;border:1px solid rgba(15,35,63,0.1)}
.dot.a{background:var(--blue)}
.dot.b{background:var(--green)}

.equation-set{display:grid;gap:18px;justify-items:center;margin:0 auto 20px}
.equation-row{display:flex;align-items:center;justify-content:center;gap:14px;min-height:58px;
  font-size:clamp(28px,6.8vw,42px);font-weight:700;color:#061b35}
.equation-row.given{color:#17395f}
.equation-row .label{font-size:13px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft);
  align-self:flex-start;min-width:72px;text-align:right;padding-top:8px}
.equation-row .op,.equation-row .equals{font-weight:700;color:#000}
.blank{width:76px;height:46px;border:2px solid #b7c8db;border-radius:5px;background:#fff;
  font:700 clamp(24px,5.4vw,34px)/1 Arial,"Helvetica Neue",Helvetica,sans-serif;
  color:#061b35;text-align:center;box-shadow:inset 0 1px 2px rgba(15,35,63,0.08)}
.blank:focus{outline:3px solid #84c5ff;border-color:var(--blue)}
.blank.right{border-color:var(--green);background:#ecfdf5}
.blank.wrong{border-color:var(--red);background:#fef2f2}
.known{min-width:42px;text-align:center}
.known.blankish{display:inline-flex;align-items:center;justify-content:center;width:76px;height:46px;
  border:2px solid #d8e2ee;border-radius:5px;background:#f8fafc}
.known.whole-lock{border-color:#fbbf24;background:#fffbeb;color:#92400e}
.number-bank{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:2px auto 18px}
.tile{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;min-width:68px;min-height:58px;
  border-radius:8px;border:2px solid #d8e2ee;background:#fff;font-weight:800;color:#061b35;
  box-shadow:0 1px 0 rgba(15,35,63,0.07)}
.tile .num{font-size:clamp(24px,5vw,34px);line-height:1}
.tile .tag{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft);margin-top:4px}
.tile.whole{border-color:#fbbf24;background:#fffbeb}
.choice-grid{display:grid;gap:10px;margin:0 auto 20px;max-width:520px}
.choice-btn{border:2px solid #d8e2ee;background:#fff;border-radius:8px;padding:14px;
  font-size:clamp(23px,5vw,34px);font-weight:800;color:#061b35}
.choice-btn.on{border-color:var(--blue);background:#eff6ff}
.choice-btn.right{border-color:var(--green);background:#ecfdf5}
.choice-btn.wrong{border-color:var(--red);background:#fef2f2}
.switch-explain{margin-top:14px;padding:13px;border-radius:8px;background:#fffbeb;border:1px solid #fde68a;
  text-align:center;font-weight:800;color:#78350f}
.switch-explain .line{font-size:clamp(18px,4vw,24px);margin-top:4px}
.switch-explain .whole{color:#92400e}
.switch-explain .part{color:#1268e3}
@keyframes popIn{0%{transform:scale(.98);opacity:.4}100%{transform:scale(1);opacity:1}}

.controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:10px}

/* feedback banner */
.banner{margin:14px 0 2px;border-radius:7px;padding:11px 14px;font-weight:700;text-align:center;
  font-size:clamp(16px,3.4vw,20px);animation:popIn .18s ease;border:1px solid}
.banner.correct{background:#ecfdf5;color:var(--green-d);border-color:#86efac}
.banner.wrong{background:#fff7ed;color:var(--orange-d);border-color:#fed7aa}

/* the connection reveal (morph) */
.connection{margin-top:14px;padding:14px;border-radius:8px;background:#f8fafc;border:1px solid #dbe4ef}
.connection .eq{font-size:clamp(22px,5.2vw,32px);font-weight:700;text-align:center;color:#6d28d9;
  opacity:0;transform:translateY(10px)}
.connection .eq.show{animation:slideUp .5s forwards}
.connection .eq .add{color:var(--blue-d)}
.connection .eq .sub{color:var(--purple-d)}
@keyframes slideUp{to{opacity:1;transform:none}}

/* strategy overlay */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,0.45);display:flex;align-items:center;
  justify-content:center;padding:18px;z-index:50}
.sheet{background:#fff;border-radius:8px;padding:22px;max-width:520px;width:100%;
  box-shadow:0 16px 50px rgba(0,0,0,0.35);max-height:90dvh;overflow:auto}
.sheet h3{font-size:clamp(19px,4.4vw,24px);text-align:center;margin-bottom:14px;color:var(--blue-d)}
.stratgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stratbtn{background:#f1f5f9;border-radius:7px;padding:12px 6px;font-weight:700;font-size:14px;
  display:flex;flex-direction:column;align-items:center;gap:6px;border:2px solid #e2e8f0}
.stratbtn:active{transform:scale(.96)}
.stratbtn .ic{font-size:26px}

/* dashboard */
.dash h2{font-size:clamp(20px,4.6vw,26px);color:var(--blue-d);margin-bottom:4px}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:12px 0}
.stat{background:#f8fafc;border-radius:8px;padding:12px;text-align:center;border:1px solid #e6edf5}
.stat .n{font-size:clamp(22px,5vw,30px);font-weight:900;color:var(--blue-d)}
.stat .l{font-size:13px;font-weight:700;color:var(--ink-soft)}
.reco{background:#f7fbff;border-left:5px solid var(--green);border-radius:8px;padding:14px;margin:10px 0;font-weight:700;color:#17395f}
.reco b{display:block;color:var(--green-d);font-size:13px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chip{display:inline-flex;align-items:center;border-radius:6px;background:#eef6ff;color:#123c69;
  border:1px solid #d6e7f8;padding:4px 8px;font-size:12px;font-weight:700}
.section-title{font-weight:900;color:var(--ink);margin:16px 0 8px;font-size:clamp(16px,3.6vw,19px)}
table.facts{width:100%;border-collapse:collapse;font-size:14px}
table.facts th,table.facts td{padding:7px 8px;text-align:left;border-bottom:1px solid #eef2f7}
table.facts th{color:var(--ink-soft);font-size:12px;text-transform:uppercase;letter-spacing:.4px}
.box-chip{display:inline-block;min-width:24px;text-align:center;border-radius:8px;padding:2px 6px;color:#fff;font-weight:900}
.b1{background:#ef4444}.b2{background:#f97316}.b3{background:#eab308;color:#3b2300}.b4{background:#22c55e}.b5{background:#0f766e}
.b0{background:#94a3b8}
.transfer{display:flex;gap:6px;flex-wrap:wrap}
.tcell{font-size:12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:6px 8px}
.tcell b{color:var(--ink)}
textarea.config{width:100%;min-height:140px;border-radius:14px;border:2px solid #cbd5e1;padding:10px;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;resize:vertical}
.errlist{color:var(--red-d);font-size:13px;font-weight:700;margin-top:6px}
.scroll-x{overflow-x:auto}

/* toast */
#toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(120%);
  background:#1e293b;color:#fff;font-weight:800;padding:12px 20px;border-radius:16px;z-index:80;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);max-width:90vw;text-align:center;transition:transform .35s}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.bad{background:#7f1d1d}

@media (max-width:430px){
  .stratgrid{grid-template-columns:repeat(2,1fr)}
  body{padding:10px}
  .card{padding:18px}
  .equation-row{gap:8px}
  .blank,.known.blankish{width:62px;height:42px}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script>
"use strict";
/* =========================================================================
   1. CONSTANTS
   ========================================================================= */
const APP_VERSION = "1.3.0";
const SCHEMA_VERSION = 1;
const CHILD_NAME = "James";

const KEYS = {
  settings:   "mc_settings_v1",
  problemLog: "mc_problemLog_v1",
  sessionLog: "mc_sessionLog_v1",
  config:     "mc_adaptiveConfig_v1",
  mastery:    "mc_factMastery_v1",
};

const MODES = ["factFamily"];                 // single, focused activity
const LEGACY_TYPES = ["ADD", "SUB1", "SUB2", "CONNECT"];
const STRUCTURE_TYPES = ["PICTURE_FAMILY", "COMPANION", "ADD_TO_SUB", "NOT_FAMILY", "WHOLE_FIRST"];
const PROBLEM_TYPES = [...STRUCTURE_TYPES, ...LEGACY_TYPES];
const REVIEW_SLOT = "SPACED_REVIEW";
const SESSION_TYPE_ORDER = ["PICTURE_FAMILY", "ADD_TO_SUB", "COMPANION", "NOT_FAMILY", "WHOLE_FIRST", "ADD", "SUB1", "SUB2", "CONNECT"];

// Default adaptive config. Everything the AI loop can change lives here.
const DEFAULT_CONFIG = Object.freeze({
  schemaVersion: SCHEMA_VERSION,
  configId: null,
  createdBy: "default",
  note: "",
  numberRange: { min: 0, max: 10 },
  sessionLength: 6,
  emphasizeFamilies: [],
  avoidFamilies: [],
  emphasizeFacts: [],
  problemTypeMix: {
    PICTURE_FAMILY: 0.4,
    ADD_TO_SUB: 0.2,
    COMPANION: 0.2,
    NOT_FAMILY: 0.2,
    WHOLE_FIRST: 0,
    ADD: 0,
    SUB1: 0,
    SUB2: 0,
    CONNECT: 0,
  },
  hintBehavior: { autoHintAfterWrong: 1, alwaysOfferMorph: true },
  mastery: { streakToMaster: 3, demoteOnMiss: true },
  ttsRate: 0.92,
});

// Leitner box -> selection weight (lower box = practiced more often).
const BOX_WEIGHT = { 1: 5, 2: 3, 3: 2, 4: 1, 5: 0.3 };
const MAX_LOG = 1500;                         // cap stored problems (export-before-prune nudge)

// Real-world contexts retained for the exported problem metadata.
const CONTEXTS = [
  { noun: "apples",   a: "red",    b: "green"  },
  { noun: "balloons", a: "blue",   b: "orange" },
  { noun: "fish",     a: "orange", b: "purple" },
  { noun: "flowers",  a: "pink",   b: "purple" },
  { noun: "birds",    a: "blue",   b: "yellow" },
  { noun: "bugs",     a: "red",    b: "teal"   },
  { noun: "blocks",   a: "green",  b: "blue"   },
  { noun: "ducks",    a: "yellow", b: "teal"   },
];
const STUD_COLORS = ["red","green","blue","purple","orange","pink","yellow","teal"];

const STRATEGIES = [
  { tag: "memory",     ic: "🧠", label: "Just knew it" },
  { tag: "counton",    ic: "➕", label: "Counted on" },
  { tag: "countback",  ic: "➖", label: "Counted back" },
  { tag: "usedadd",    ic: "🔗", label: "Used adding" },
  { tag: "fingers",    ic: "✋", label: "Fingers" },
  { tag: "guessed",    ic: "❓", label: "Guessed" },
];

const FOCUS_DEFS = Object.freeze({
  additionRecall: {
    label: "addition fact recall",
    plan: "Practice addition rows first, then connect them to the family.",
    multipliers: { PICTURE_FAMILY: 2.8, ADD: 3, ADD_TO_SUB: 2.4, COMPANION: 1.2, SUB1: 1, SUB2: 1, CONNECT: 1.2, NOT_FAMILY: .7, WHOLE_FIRST: .7 },
  },
  subtractionRecall: {
    label: "subtraction fact recall",
    plan: "Practice taking away before asking for the matching addition.",
    multipliers: { PICTURE_FAMILY: 2.4, COMPANION: 3, ADD_TO_SUB: 2.2, SUB1: 2.2, SUB2: 2.2, ADD: .8, CONNECT: 1, NOT_FAMILY: .7, WHOLE_FIRST: 1.4 },
  },
  addToSubTransfer: {
    label: "turn addition into subtraction",
    plan: "Keep the whole first, then switch the two parts.",
    multipliers: { PICTURE_FAMILY: 3.8, COMPANION: 4.2, ADD_TO_SUB: 4, NOT_FAMILY: 1.8, WHOLE_FIRST: 1.6, ADD: .8, SUB1: .6, SUB2: .6, CONNECT: 1.2 },
  },
  subToAddTransfer: {
    label: "turn subtraction into addition",
    plan: "Solve a take-away fact, then rebuild the matching addition.",
    multipliers: { PICTURE_FAMILY: 2, SUB1: 3, SUB2: 3, COMPANION: 2.2, ADD_TO_SUB: 1.4, ADD: .8, CONNECT: .8, NOT_FAMILY: 1, WHOLE_FIRST: 1 },
  },
  pictureToEquation: {
    label: "turn pictures into equations",
    plan: "Start from a small picture and write the equations it shows.",
    multipliers: { PICTURE_FAMILY: 5, CONNECT: 2, WHOLE_FIRST: 1.6, ADD_TO_SUB: 1.2, COMPANION: 1, ADD: .7, SUB1: .5, SUB2: .5, NOT_FAMILY: 1 },
  },
  wholeFirst: {
    label: "find the whole before subtracting",
    plan: "Pick the whole first; subtraction in this family starts with the whole.",
    multipliers: { PICTURE_FAMILY: 3.2, WHOLE_FIRST: 4.4, NOT_FAMILY: 3.2, COMPANION: 2.4, ADD_TO_SUB: 1.8, ADD: .5, SUB1: .7, SUB2: .7, CONNECT: 1 },
  },
});

/* =========================================================================
   2. SMALL HELPERS
   ========================================================================= */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function rand(a, b){ return Math.floor(Math.random() * (b - a + 1)) + a; }
function nowIso(){ return new Date().toISOString(); }
function clamp(n, lo, hi){ n = Number(n); if (!isFinite(n)) return lo; return Math.max(lo, Math.min(hi, n)); }
function cap(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

function lsGet(key, fallback){
  try { const raw = localStorage.getItem(key); return raw == null ? fallback : JSON.parse(raw); }
  catch(e){ return fallback; }
}
function lsSet(key, val){
  try { localStorage.setItem(key, JSON.stringify(val)); return true; }
  catch(e){ return false; }   // quota / private mode — degrade gracefully
}

// Tiny DOM factory.
function el(tag, cls, text){
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = text;
  return n;
}

let _toastTimer = null;
function toast(msg, bad){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.toggle("bad", !!bad); t.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove("show"), 3200);
}

/* =========================================================================
   3. TEXT-TO-SPEECH  (voice picker reused from the proven prototype)
   ========================================================================= */
let _voiceCache = null;
function selectBestVoice(){
  if (_voiceCache) return _voiceCache;
  if (!("speechSynthesis" in window)) return null;
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return null;
  if (state.settings.voiceURI){
    const picked = voices.find(v => v.voiceURI === state.settings.voiceURI);
    if (picked){ _voiceCache = picked; return picked; }
  }
  const enVoices = voices.filter(v => /^en([-_]|$)/i.test(v.lang));
  if (!enVoices.length) return null;
  const BAD = /albert|bad news|bahh|bells|boing|bubbles|cellos|deranged|good news|hysterical|jester|organ|superstar|trinoids|whisper|zarvox|grandma|grandpa|reed|rocko|sandy|shelley|flo|eddy|junior|kathy|fred|ralph|princess|bruce|agnes|vicki|victoria/i;
  const SIRI = /^siri\b|\bsiri voice\b/i;
  const PREMIUM = /\(enhanced\)|\(premium\)|\(natural\)|\(neural\)|wavenet|online \(natural\)/i;
  const GOOD = /samantha|ava|allison|susan|tom|nicky|aaron|joelle|noelle|karen|moira|fiona|tessa|serena|daniel|aria|jenny|jane|nancy|sara|emma|libby|natasha|clara|mia|sonia|amber|michelle/i;
  const GOOGLE = /google\s+(uk|us)\s+english/i;
  function score(v){
    let s = 0; const name = v.name;
    if (BAD.test(name)) return -1000;
    if (SIRI.test(name)) s += 350;
    if (PREMIUM.test(name)) s += 200;
    if (GOOGLE.test(name)) s += 120;
    if (/microsoft.*online \(natural\)/i.test(name)) s += 180;
    if (GOOD.test(name)) s += 60;
    if (/^en-US/i.test(v.lang)) s += 10;
    if (/^en-GB/i.test(v.lang)) s += 8;
    if (v.localService) s += 8;
    if (/microsoft david|microsoft mark/i.test(name)) s -= 25;
    return s;
  }
  enVoices.sort((a,b) => score(b) - score(a));
  _voiceCache = enVoices[0];
  return _voiceCache;
}
if ("speechSynthesis" in window){
  window.speechSynthesis.onvoiceschanged = () => { _voiceCache = null; selectBestVoice(); };
}
function speak(text){
  if (!state.settings.speech) return;
  if (!("speechSynthesis" in window)) return;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const v = selectBestVoice();
    if (v){ u.voice = v; u.lang = v.lang; }
    u.rate = clamp(state.config.ttsRate, 0.6, 1.4);
    u.pitch = 1.1; u.volume = 1;
    window.speechSynthesis.speak(u);
  } catch(e){}
}

/* =========================================================================
   4. FACT-FAMILY MATH
   A family = {a, b, whole} with a <= b and a + b = whole, both parts >= 1.
   ========================================================================= */
function canonFamilyId(a, b){
  const lo = Math.min(a, b), hi = Math.max(a, b);
  return `${lo}+${hi}=${lo + hi}`;
}
function makeFamily(a, b){
  const lo = Math.min(a, b), hi = Math.max(a, b);
  return { a: lo, b: hi, whole: lo + hi, id: canonFamilyId(lo, hi) };
}
function familyFromId(id){
  const m = String(id || "").match(/^(\d+)\+(\d+)=(\d+)$/);
  if (!m) return null;
  const fam = makeFamily(Number(m[1]), Number(m[2]));
  return fam.whole === Number(m[3]) ? fam : null;
}
function familyIdForFact(fact){
  const s = String(fact || "").replace(/\s/g, "");
  let m = s.match(/^(\d+)\+(\d+)$/);
  if (m) return canonFamilyId(Number(m[1]), Number(m[2]));
  m = s.match(/^(\d+)-(\d+)$/);
  if (!m) return null;
  const whole = Number(m[1]), part = Number(m[2]), other = whole - part;
  return other >= 1 ? canonFamilyId(part, other) : null;
}
// The (up to) three distinct facts in a family.
function factsOfFamily(fam){
  const facts = [ `${fam.a}+${fam.b}`, `${fam.whole}-${fam.a}`, `${fam.whole}-${fam.b}` ];
  return [...new Set(facts)];
}
function factsOfFamilyId(id){
  const fam = familyFromId(id);
  return fam ? factsOfFamily(fam) : [];
}
function isStructuralType(type){ return STRUCTURE_TYPES.includes(type); }
function isPictureFamilyType(type){ return type === "PICTURE_FAMILY"; }
function needsDistinctParts(type){ return type === "PICTURE_FAMILY" || type === "COMPANION" || type === "ADD_TO_SUB" || type === "NOT_FAMILY"; }
function relevantFact(type, fam){
  switch(type){
    case "ADD":  return `${fam.a}+${fam.b}`;
    case "SUB1": return `${fam.whole}-${fam.a}`;   // answer = b
    case "SUB2": return `${fam.whole}-${fam.b}`;   // answer = a
    case "PICTURE_FAMILY":
      return `${fam.a}+${fam.b}`;
    case "COMPANION":
    case "ADD_TO_SUB":
    case "NOT_FAMILY":
    case "WHOLE_FIRST":
      return `${fam.whole}-${fam.a}`;
    case "CONNECT": {
      // Drill the weaker of the two subtractions, with its addition shown.
      const f1 = `${fam.whole}-${fam.a}`, f2 = `${fam.whole}-${fam.b}`;
      return masteryBox(f2) < masteryBox(f1) ? f2 : f1;
    }
  }
  return `${fam.a}+${fam.b}`;
}
// All canonical families whose whole fits the active number range.
function familiesInRange(cfg){
  const max = clamp(cfg.numberRange.max, 2, 20);
  const out = [];
  for (let a = 1; a <= max; a++){
    for (let b = a; b <= max; b++){
      if (a + b <= max) out.push(makeFamily(a, b));
    }
  }
  return out;
}

/* =========================================================================
   5. MASTERY (Leitner-ish) + WEIGHTED SELECTION
   ========================================================================= */
function masteryFor(fact){
  return state.mastery[fact] || { box: 0, streak: 0, attempts: 0, correct: 0, lastSeen: 0 };
}
function masteryBox(fact){ const m = state.mastery[fact]; return m ? m.box : 1; }

function factMasteryUpdate(fact, correctFirstTry){
  const m = state.mastery[fact] || { box: 1, streak: 0, attempts: 0, correct: 0, lastSeen: 0 };
  m.attempts++;
  if (correctFirstTry){
    m.correct++; m.streak++;
    if (m.streak >= state.config.mastery.streakToMaster){ m.box = Math.min(5, m.box + 1); m.streak = 0; }
  } else {
    m.streak = 0;
    if (state.config.mastery.demoteOnMiss) m.box = Math.max(1, m.box - 1);
  }
  m.lastSeen = Date.now();
  state.mastery[fact] = m;
  persistMastery();
}

// Pick a family (for a given problem type) weighted by how much its key fact
// needs practice. Honors config emphasis/avoid + an anti-repeat guard.
function selectWeightedFamily(pool, type, cfg, focus){
  let candidates = pool.filter(f => !cfg.avoidFamilies.includes(f.id));
  if (needsDistinctParts(type)){
    const distinct = candidates.filter(f => f.a !== f.b);
    if (distinct.length) candidates = distinct;
  }
  if (!candidates.length){
    toast("Config avoids every family in range — using the full set.", true);
    candidates = pool.slice();
    if (needsDistinctParts(type)){
      const distinct = candidates.filter(f => f.a !== f.b);
      if (distinct.length) candidates = distinct;
    }
  }
  const recent = new Set(state.recentMisses);
  const targetFamilies = new Set((focus && focus.targetFamilies) || []);
  const targetFacts = new Set((focus && focus.targetFacts) || []);
  const weights = candidates.map(fam => {
    const fact = relevantFact(type, fam);
    const m = state.mastery[fact];
    let w = m ? (BOX_WEIGHT[m.box] || 1) : 4.5;        // unseen facts: solid base weight
    if (recent.has(fact)) w *= 2.5;
    if (!m) w *= 1.25;                                  // mild novelty bonus
    if (cfg.emphasizeFamilies.includes(fam.id)) w *= 3;
    if (cfg.emphasizeFacts.includes(fact)) w *= 3;
    if (targetFamilies.has(fam.id)) w *= 4;
    if (targetFacts.has(fact)) w *= 3;
    if (factsOfFamily(fam).some(f => targetFacts.has(f))) w *= 2;
    if (state.lastKey === fam.id + "|" + type) w *= 0.15;  // avoid identical repeat
    return Math.max(0.001, w);
  });
  const total = weights.reduce((s, w) => s + w, 0);
  let r = Math.random() * total;
  for (let i = 0; i < candidates.length; i++){ r -= weights[i]; if (r <= 0) return candidates[i]; }
  return candidates[candidates.length - 1];
}

function weightedType(mix){
  const entries = PROBLEM_TYPES.map(t => [t, Math.max(0, Number(mix[t]) || 0)]);
  const total = entries.reduce((s, e) => s + e[1], 0) || 1;
  let r = Math.random() * total;
  for (const [t, w] of entries){ r -= w; if (r <= 0) return t; }
  return "ADD";
}

function buildSessionTypePlan(cfg, focus){
  const length = Math.max(1, Math.round(cfg.sessionLength || 6));
  if (usesDefaultProblemTypeMix(cfg.problemTypeMix)){
    return buildConceptualSessionPlan(length, focus);
  }
  const mix = focus ? focusedTypeMix(cfg.problemTypeMix, focus) : cfg.problemTypeMix;
  const entries = PROBLEM_TYPES
    .map(t => ({ type: t, weight: Math.max(0, Number(mix[t]) || 0) }))
    .filter(e => e.weight > 0);
  if (!entries.length) return buildConceptualSessionPlan(length, focus);
  const total = entries.reduce((s, e) => s + e.weight, 0);
  let used = 0;
  for (const e of entries){
    const exact = e.weight / total * length;
    e.count = Math.floor(exact);
    e.remainder = exact - e.count;
    used += e.count;
  }
  entries.sort((a,b) => b.remainder - a.remainder);
  for (let i = 0; used < length; i++, used++) entries[i % entries.length].count++;
  const plan = [];
  for (const type of SESSION_TYPE_ORDER){
    const e = entries.find(item => item.type === type);
    if (e) for (let i = 0; i < e.count; i++) plan.push(e.type);
  }
  return plan.slice(0, length);
}

function usesDefaultProblemTypeMix(mix){
  return PROBLEM_TYPES.every(type => Math.abs((Number(mix[type]) || 0) - (Number(DEFAULT_CONFIG.problemTypeMix[type]) || 0)) < 1e-9);
}

function buildConceptualSessionPlan(length, focus){
  const weakest = focus && focus.id ? focus.id : "pictureToEquation";
  const current = typesForFocus(weakest);
  const prereq = prerequisiteTypesForFocus(weakest);
  const transfer = transferTypesForFocus(weakest);
  const plan = [
    "PICTURE_FAMILY",
    "PICTURE_FAMILY",
    "ADD_TO_SUB",
    "COMPANION",
    "NOT_FAMILY",
    REVIEW_SLOT,
  ];
  if (state.problemLog.length >= 6 && current[0]){
    plan[0] = current[0];
    plan[1] = current[1] || current[0];
    plan[2] = prereq[0] || plan[2];
    plan[3] = transfer[0] || plan[3];
  }
  const extension = [REVIEW_SLOT, current[0] || "PICTURE_FAMILY", prereq[0] || "PICTURE_FAMILY", transfer[0] || "NOT_FAMILY"];
  for (let i = 0; plan.length < length; i++){
    plan.push(extension[i % extension.length]);
  }
  return plan.slice(0, length);
}

function typesForFocus(focusId){
  switch(focusId){
    case "pictureToEquation": return ["PICTURE_FAMILY", "PICTURE_FAMILY"];
    case "wholeFirst": return ["NOT_FAMILY", "COMPANION"];
    case "addToSubTransfer": return ["ADD_TO_SUB", "COMPANION"];
    case "subToAddTransfer": return ["COMPANION", "ADD_TO_SUB"];
    case "subtractionRecall": return ["COMPANION", "SUB1"];
    case "additionRecall": return ["PICTURE_FAMILY", "ADD"];
    default: return ["PICTURE_FAMILY", "ADD_TO_SUB"];
  }
}

function prerequisiteTypesForFocus(focusId){
  switch(focusId){
    case "pictureToEquation": return ["PICTURE_FAMILY"];
    case "wholeFirst": return ["PICTURE_FAMILY"];
    case "addToSubTransfer": return ["PICTURE_FAMILY"];
    case "subToAddTransfer": return ["COMPANION"];
    case "subtractionRecall": return ["ADD_TO_SUB"];
    case "additionRecall": return ["PICTURE_FAMILY"];
    default: return ["PICTURE_FAMILY"];
  }
}

function transferTypesForFocus(focusId){
  switch(focusId){
    case "pictureToEquation": return ["ADD_TO_SUB"];
    case "wholeFirst": return ["NOT_FAMILY"];
    case "addToSubTransfer": return ["NOT_FAMILY"];
    case "subToAddTransfer": return ["ADD_TO_SUB"];
    case "subtractionRecall": return ["NOT_FAMILY"];
    case "additionRecall": return ["COMPANION"];
    default: return ["NOT_FAMILY"];
  }
}

function focusedTypeMix(mix, focus){
  if (!focus || !focus.multipliers) return mix;
  const out = {};
  for (const t of PROBLEM_TYPES){
    const base = Math.max(0, Number(mix[t]) || 0);
    out[t] = base * (focus.multipliers[t] == null ? 1 : focus.multipliers[t]);
  }
  return out;
}

function focusDef(id){ return FOCUS_DEFS[id] || FOCUS_DEFS.addToSubTransfer; }

function answerEntries(record){
  if (Array.isArray(record.answers) && record.answers.length){
    return record.answers.map(a => ({
      id: a.id || "answer",
      fact: a.fact || record.fact,
      operation: a.operation || record.operation,
      skill: a.skill || record.skill || null,
      representation: a.representation || record.representation || null,
      correctAnswer: a.correctAnswer,
      childAnswer: a.childAnswer == null ? null : a.childAnswer,
      finalAnswer: a.finalAnswer == null ? null : a.finalAnswer,
      correctFirstTry: Boolean(a.correctFirstTry),
      errorCode: a.errorCode || null,
    }));
  }
  return [{
    id: "answer",
    fact: record.fact,
    operation: record.operation,
    skill: record.skill || null,
    representation: record.representation || null,
    correctAnswer: record.correctAnswer,
    childAnswer: record.childAnswer == null ? null : record.childAnswer,
    finalAnswer: record.childAnswer == null ? null : record.childAnswer,
    correctFirstTry: Boolean(record.correctFirstTry),
    errorCode: null,
  }];
}

function signalWeight(record){
  const attempts = Math.max(1, Number(record.attempts) || 1);
  let weight = 1 + Math.min(1.2, (attempts - 1) * 0.35);
  if (record.hintUsed) weight += 0.25;
  if (record.morphViewed) weight += 0.15;
  if (record.strategyTag === "guessed") weight += 0.35;
  return weight;
}

function classifyDeficitSignals(record){
  if (!record || record.correctFirstTry) return [];
  if (Array.isArray(record.structuralErrorCodes) && record.structuralErrorCodes.length){
    return record.structuralErrorCodes.map(code => ({
      id: focusForErrorCode(code),
      facts: factsOfFamilyId(record.factFamilyId),
      family: record.factFamilyId || familyIdForFact(record.fact),
      reason: code === "PART_MINUS_PART"
        ? "wrote a true part-minus-part equation instead of starting with the whole"
        : code === "ARITHMETIC_ERROR"
          ? "kept the family structure but made an arithmetic subtraction error"
        : code === "DUPLICATE_SUBTRACTION"
          ? "repeated one subtraction instead of making both matching subtractions"
        : code === "PICTURE_PART_COUNT_ERROR"
          ? "miscounted one of the colored parts in the picture"
        : code === "PICTURE_WHOLE_COUNT_ERROR"
          ? "did not identify the whole as all of the dots together"
        : code === "PICTURE_ADDITION_ARITHMETIC_ERROR"
          ? "used picture numbers but did not write a true addition"
        : code === "WHOLE_NOT_FIRST" || code === "WRONG_WHOLE" || code === "TRUE_BUT_OTHER_FAMILY"
          ? "did not keep the family whole in the first subtraction position"
          : "did not switch the two parts to make the companion subtraction",
      weight: signalWeight(record) + (code === "PART_MINUS_PART" ? .8 : .4),
    }));
  }
  const answers = answerEntries(record);
  const missed = answers.filter(a => !a.correctFirstTry);
  if (!missed.length) return [];
  const signals = [];
  const weight = signalWeight(record);
  const fam = record.factFamilyId || familyIdForFact(record.fact);
  const addMisses = missed.filter(a => a.operation === "addition");
  const subMisses = missed.filter(a => a.operation === "subtraction");
  const sum = answers.find(a => a.id === "sum");
  const subAnswer = answers.find(a => /^sub/.test(a.id));
  const addAnswer = answers.find(a => /^add/.test(a.id));
  const picAdd = answers.find(a => /^picAdd/.test(a.id));

  function push(id, facts, reason, extraWeight){
    signals.push({
      id,
      facts: [...new Set((facts || []).filter(Boolean))],
      family: fam,
      reason,
      weight: weight + (extraWeight || 0),
    });
  }

  if (record.problemType === "ADD"){
    if (sum && !sum.correctFirstTry) push("additionRecall", [sum.fact], "missed the addition row");
    if (subMisses.length){
      push(sum && sum.correctFirstTry ? "addToSubTransfer" : "subtractionRecall",
        subMisses.map(a => a.fact),
        sum && sum.correctFirstTry ? "addition was right but matching subtraction was missed" : "matching subtraction rows were missed");
    }
  } else if (record.problemType === "SUB1" || record.problemType === "SUB2"){
    if (subAnswer && !subAnswer.correctFirstTry) push("subtractionRecall", [subAnswer.fact], "missed the take-away fact");
    if (addAnswer && !addAnswer.correctFirstTry){
      push(subAnswer && subAnswer.correctFirstTry ? "subToAddTransfer" : "additionRecall",
        [addAnswer.fact],
        subAnswer && subAnswer.correctFirstTry ? "take-away was right but matching addition was missed" : "matching addition was missed");
    }
  } else if (record.problemType === "CONNECT"){
    if (picAdd && !picAdd.correctFirstTry) push("pictureToEquation", [picAdd.fact], "picture did not turn into the addition equation");
    if (subMisses.length){
      push(picAdd && picAdd.correctFirstTry ? "addToSubTransfer" : "subtractionRecall",
        subMisses.map(a => a.fact),
        picAdd && picAdd.correctFirstTry ? "picture addition was right but subtraction was missed" : "picture subtraction was missed");
    }
  } else if (record.problemType === "PICTURE_FAMILY"){
    const countMisses = missed.filter(a => a.operation === "count");
    if (countMisses.length) push("pictureToEquation", [], "picture quantities were miscounted");
    if (addMisses.length) push("pictureToEquation", addMisses.map(a => a.fact), "picture did not turn into the addition equation");
    if (subMisses.length){
      push(addMisses.length ? "pictureToEquation" : "addToSubTransfer",
        subMisses.map(a => a.fact),
        addMisses.length ? "picture equations were not mapped consistently" : "picture addition was right but subtraction was missed");
    }
  }

  if (!signals.length){
    const op = missed[0].operation === "subtraction"
      ? "subtractionRecall"
      : missed[0].operation === "count"
        ? "pictureToEquation"
        : "additionRecall";
    push(op, missed.map(a => a.fact), "missed the first answer");
  }
  return signals;
}

function addCounter(map, key, amount){
  if (!key) return;
  map[key] = (map[key] || 0) + (amount || 1);
}

function addRatioStat(map, key, correct){
  if (!key) return;
  const stat = map[key] || (map[key] = { seen: 0, correct: 0, misses: 0 });
  stat.seen++;
  if (correct) stat.correct++;
  else stat.misses++;
}

function buildDeficitProfile(records){
  const recent = (records || []).filter(r => r && r.mode === "factFamily").slice(-60);
  const profile = {
    total: recent.length,
    focus: {},
    factStats: {},
    familyStats: {},
    skillStats: {},
    representationStats: {},
  };

  function focusBucket(id){
    const def = focusDef(id);
    return profile.focus[id] || (profile.focus[id] = {
      id,
      label: def.label,
      score: 0,
      misses: 0,
      facts: {},
      families: {},
      examples: [],
    });
  }
  function addSignal(sig){
    const b = focusBucket(sig.id);
    b.score += sig.weight || 1;
    b.misses++;
    addCounter(b.families, sig.family, sig.weight || 1);
    for (const f of sig.facts || []) addCounter(b.facts, f, sig.weight || 1);
    if (sig.reason && b.examples.length < 2) b.examples.push(sig.reason);
  }

  for (const r of recent){
    const famId = r.factFamilyId || familyIdForFact(r.fact);
    const fam = profile.familyStats[famId] || (profile.familyStats[famId] = { add: { seen:0, correct:0 }, sub: { seen:0, correct:0 } });
    for (const a of answerEntries(r)){
      if (a.skill) addRatioStat(profile.skillStats, a.skill, a.correctFirstTry);
      if (a.representation) addRatioStat(profile.representationStats, a.representation, a.correctFirstTry);
      if (a.operation !== "addition" && a.operation !== "subtraction") continue;
      addRatioStat(profile.factStats, a.fact, a.correctFirstTry);
      const slot = a.operation === "subtraction" ? fam.sub : fam.add;
      slot.seen++;
      if (a.correctFirstTry) slot.correct++;
    }
    for (const sig of classifyDeficitSignals(r)) addSignal(sig);
  }

  for (const [famId, stat] of Object.entries(profile.familyStats)){
    if (!famId) continue;
    const addSeen = stat.add.seen, subSeen = stat.sub.seen;
    const addAcc = addSeen ? stat.add.correct / addSeen : null;
    const subAcc = subSeen ? stat.sub.correct / subSeen : null;
    if (addSeen >= 2 && subSeen >= 2 && addAcc >= .7 && subAcc <= .6){
      addSignal({
        id: "addToSubTransfer",
        family: famId,
        facts: factsOfFamilyId(famId).filter(f => f.includes("-")),
        weight: 1.4 + (addAcc - subAcc),
        reason: "addition is stronger than subtraction in the same family",
      });
    }
  }
  return profile;
}

function rankedKeys(map, limit){
  return Object.entries(map || {})
    .sort((a,b) => b[1] - a[1])
    .slice(0, limit)
    .map(([k]) => k);
}

function weakFactFallback(profile){
  const facts = Object.entries(profile.factStats)
    .filter(([,m]) => m.seen >= 1 && m.misses > 0)
    .sort((a,b) => (b[1].misses / Math.max(1,b[1].seen)) - (a[1].misses / Math.max(1,a[1].seen)));
  if (!facts.length) return null;
  const fact = facts[0][0];
  const id = fact.includes("-") ? "subtractionRecall" : "additionRecall";
  return {
    id,
    score: facts[0][1].misses || 1,
    targetFacts: [fact],
    targetFamilies: [familyIdForFact(fact)].filter(Boolean),
    reason: `${fact} has the lowest first-try accuracy so far.`,
  };
}

function derivePracticeFocus(records){
  const profile = buildDeficitProfile(records || state.problemLog);
  if (profile.total < 4){
    const def = focusDef("addToSubTransfer");
    return Object.assign({ id: "addToSubTransfer", targetFacts: [], targetFamilies: [],
      reason: "Not enough data yet, so the session starts with the core addition-subtraction connection.",
      score: 0, samples: profile.total }, def);
  }
  const scored = Object.values(profile.focus).filter(f => f.score > 0)
    .sort((a,b) => b.score - a.score);
  const picked = scored[0] || weakFactFallback(profile);
  if (!picked){
    const def = focusDef("addToSubTransfer");
    return Object.assign({ id: "addToSubTransfer", targetFacts: [], targetFamilies: [],
      reason: "No clear weak spot yet, so the app keeps rotating through the connection.",
      score: 0, samples: profile.total }, def);
  }
  const def = focusDef(picked.id);
  const targetFacts = picked.targetFacts || rankedKeys(picked.facts, 4);
  const targetFamilies = picked.targetFamilies || rankedKeys(picked.families, 4);
  const example = picked.examples && picked.examples[0] ? picked.examples[0] : def.plan;
  return Object.assign({
    id: picked.id,
    targetFacts,
    targetFamilies,
    reason: `${cap(example)}.`,
    score: picked.score,
    samples: profile.total,
  }, def);
}

function deriveScaffoldLevel(records){
  const recent = (records || state.problemLog)
    .filter(r => r && isStructuralType(r.problemType))
    .slice(-18);
  if (recent.length < 8) return 1;
  const independent = recent.filter(r => r.correctFirstTry && !r.hintUsed).length;
  const rate = independent / recent.length;
  if (recent.length >= 14 && rate >= .82) return 4;
  if (rate >= .72) return 3;
  return 2;
}

function shuffled(arr){
  const out = arr.slice();
  for (let i = out.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [out[i], out[j]] = [out[j], out[i]];
  }
  return out;
}

function buildNumberTiles(fam, revealWhole){
  return [
    { value: fam.whole, role: "whole", label: revealWhole ? "Whole" : "" },
    { value: fam.a, role: "part", label: revealWhole ? "Part" : "" },
    { value: fam.b, role: "part", label: revealWhole ? "Part" : "" },
  ];
}

function structuralRowValues(row, results){
  const byId = Object.fromEntries(results.map(r => [r.id, r.submitted]));
  return row.fieldIds.map(id => byId[id]);
}

function allNumbers(values){
  return values.every(v => typeof v === "number" && Number.isInteger(v));
}

function constructRowKey(values){
  return values.join("-");
}

function expectedConstructKeys(p){
  return (p.constructRows || []).map(row => constructRowKey(row.expected || []));
}

function pictureAdditionKeys(p){
  return [
    constructRowKey([p.a, p.b, p.whole]),
    constructRowKey([p.b, p.a, p.whole]),
  ];
}

function pictureSubtractionKeys(p){
  return [
    constructRowKey([p.whole, p.a, p.b]),
    constructRowKey([p.whole, p.b, p.a]),
  ];
}

function gradePictureAdditionRow(p, row, values){
  const grade = {
    row,
    values,
    isCorrect: false,
    errorCode: null,
    arithmeticCorrect: null,
    familyCorrect: false,
    acceptedExpected: row.expected || [],
  };
  if (!allNumbers(values)) return grade;

  const [left, right, sum] = values;
  const parts = [p.a, p.b];
  const partCountsValid = parts.includes(left) && parts.includes(right) && left + right === p.whole;
  grade.arithmeticCorrect = left + right === sum;

  if (partCountsValid && sum !== p.whole){
    grade.errorCode = "PICTURE_ADDITION_ARITHMETIC_ERROR";
    return grade;
  }
  if (sum !== p.whole){
    grade.errorCode = grade.arithmeticCorrect ? "TRUE_BUT_OTHER_FAMILY" : "PICTURE_WHOLE_COUNT_ERROR";
    return grade;
  }
  if (!partCountsValid){
    grade.errorCode = "PICTURE_PART_COUNT_ERROR";
    return grade;
  }
  if (!grade.arithmeticCorrect){
    grade.errorCode = "PICTURE_ADDITION_ARITHMETIC_ERROR";
    return grade;
  }

  grade.isCorrect = true;
  grade.familyCorrect = true;
  grade.acceptedExpected = values.slice();
  return grade;
}

function gradePictureCountRow(p, row, values){
  const grade = {
    row,
    values,
    isCorrect: false,
    errorCode: null,
    arithmeticCorrect: null,
    familyCorrect: false,
    acceptedExpected: row.expected || [],
  };
  if (!allNumbers(values)) return grade;
  grade.isCorrect = values[0] === row.expected[0];
  grade.familyCorrect = grade.isCorrect;
  if (!grade.isCorrect){
    grade.errorCode = row.role === "whole" ? "PICTURE_WHOLE_COUNT_ERROR" : "PICTURE_PART_COUNT_ERROR";
  }
  return grade;
}

function gradePictureSubtractionRow(p, row, values, usedPictureSubtractions){
  const grade = {
    row,
    values,
    isCorrect: false,
    errorCode: null,
    arithmeticCorrect: null,
    familyCorrect: false,
    acceptedExpected: row.expected || [],
  };
  if (!allNumbers(values)) return grade;

  const [whole, subtrahend, difference] = values;
  const parts = [p.a, p.b];
  const key = constructRowKey(values);
  grade.arithmeticCorrect = whole - subtrahend === difference;

  if (whole !== p.whole && parts.includes(whole) && parts.includes(subtrahend) && grade.arithmeticCorrect){
    grade.errorCode = "PART_MINUS_PART";
    return grade;
  }
  if (whole !== p.whole){
    grade.errorCode = grade.arithmeticCorrect ? "TRUE_BUT_OTHER_FAMILY" : "WHOLE_NOT_FIRST";
    return grade;
  }
  if (parts.includes(subtrahend) && !grade.arithmeticCorrect){
    grade.errorCode = "ARITHMETIC_ERROR";
    return grade;
  }
  if (!parts.includes(subtrahend) || !parts.includes(difference)){
    grade.errorCode = grade.arithmeticCorrect ? "TRUE_BUT_OTHER_FAMILY" : "WRONG_PART_POSITION";
    return grade;
  }
  if (!pictureSubtractionKeys(p).includes(key)){
    grade.errorCode = "WRONG_PART_POSITION";
    return grade;
  }
  if (usedPictureSubtractions && usedPictureSubtractions.has(key)){
    grade.errorCode = "DUPLICATE_SUBTRACTION";
    return grade;
  }

  if (usedPictureSubtractions) usedPictureSubtractions.add(key);
  grade.isCorrect = true;
  grade.familyCorrect = true;
  grade.acceptedExpected = values.slice();
  return grade;
}

function gradeConstructRows(p, results){
  const rows = p.constructRows || [];
  if (!rows.length) return [];
  const expectedKeys = expectedConstructKeys(p);
  const used = new Set();
  const pictureSubtractionRows = rows.filter(row => row.skill === "pictureSubtraction");
  const usedPictureSubtractions = pictureSubtractionRows.length > 1 ? new Set() : null;
  return rows.map(row => {
    const values = structuralRowValues(row, results);
    if (row.skill === "pictureCount") return gradePictureCountRow(p, row, values);
    if (row.skill === "pictureAddition") return gradePictureAdditionRow(p, row, values);
    if (row.skill === "pictureSubtraction") return gradePictureSubtractionRow(p, row, values, usedPictureSubtractions);
    const grade = {
      row,
      values,
      isCorrect: false,
      errorCode: null,
      arithmeticCorrect: null,
      familyCorrect: false,
      acceptedExpected: row.expected || [],
    };
    if (!allNumbers(values)) return grade;

    const [whole, subtrahend, difference] = values;
    const parts = [p.a, p.b];
    const key = constructRowKey(values);
    grade.arithmeticCorrect = whole - subtrahend === difference;

    if (whole !== p.whole && parts.includes(whole) && parts.includes(subtrahend) && grade.arithmeticCorrect){
      grade.errorCode = "PART_MINUS_PART";
      return grade;
    }
    if (whole !== p.whole){
      grade.errorCode = grade.arithmeticCorrect ? "TRUE_BUT_OTHER_FAMILY" : "WHOLE_NOT_FIRST";
      return grade;
    }
    if (parts.includes(subtrahend) && !grade.arithmeticCorrect){
      grade.errorCode = "ARITHMETIC_ERROR";
      return grade;
    }
    if (!parts.includes(subtrahend) || !parts.includes(difference)){
      grade.errorCode = grade.arithmeticCorrect ? "TRUE_BUT_OTHER_FAMILY" : "WRONG_PART_POSITION";
      return grade;
    }
    if (!expectedKeys.includes(key)){
      grade.errorCode = row.skill === "companionSubtraction" ? "PARTS_NOT_SWITCHED" : "WRONG_PART_POSITION";
      return grade;
    }
    if (p.problemType === "ADD_TO_SUB" && used.has(key)){
      grade.errorCode = "DUPLICATE_SUBTRACTION";
      return grade;
    }

    used.add(key);
    grade.isCorrect = true;
    grade.familyCorrect = true;
    grade.acceptedExpected = values.slice();
    return grade;
  });
}

function applyConstructRowGrades(p, results){
  const grades = gradeConstructRows(p, results);
  if (!grades.length) return results;
  const byId = Object.fromEntries(results.map(r => [r.id, r]));
  for (const grade of grades){
    for (let i = 0; i < grade.row.fieldIds.length; i++){
      const result = byId[grade.row.fieldIds[i]];
      if (!result) continue;
      result.isCorrect = grade.isCorrect;
      result.expected = grade.acceptedExpected[i];
      result.errorCode = grade.errorCode;
      result.arithmeticCorrect = grade.arithmeticCorrect;
      result.familyCorrect = grade.familyCorrect;
    }
  }
  return results;
}

function structuralErrorsForProblem(p, results){
  if (!isStructuralType(p.problemType)) return [];
  if (p.choiceOptions){
    const result = results[0];
    return result && !result.isCorrect && result.errorCode ? [result.errorCode] : [];
  }
  const errors = [];
  if (isPictureFamilyType(p.problemType)){
    for (const result of results){
      if (result.operation === "count" && !result.isCorrect && result.errorCode) errors.push(result.errorCode);
    }
  }
  errors.push(...gradeConstructRows(p, results).map(grade => grade.errorCode).filter(Boolean));
  return [...new Set(errors)];
}

function structuralArithmeticCorrect(p, results){
  if (!isStructuralType(p.problemType)) return null;
  if (p.choiceOptions){
    const selected = p.choiceOptions.find(o => o.id === results[0]?.submitted);
    return selected ? Boolean(selected.arithmeticCorrect) : null;
  }
  if (isPictureFamilyType(p.problemType)){
    const grades = gradeConstructRows(p, results)
      .filter(grade => grade.row.skill === "pictureAddition" || grade.row.skill === "pictureSubtraction");
    return grades.length ? grades.every(grade => grade.arithmeticCorrect === true) : null;
  }
  const rows = p.constructRows || [];
  if (!rows.length) return null;
  return rows.every(row => {
    const values = structuralRowValues(row, results);
    return allNumbers(values) && values[0] - values[1] === values[2];
  });
}

function structuralFamilyCorrect(p, results){
  if (!isStructuralType(p.problemType)) return null;
  if (p.choiceOptions) return Boolean(results[0]?.isCorrect);
  if (isPictureFamilyType(p.problemType)){
    const byId = Object.fromEntries(results.map(r => [r.id, r]));
    const countFields = (p.fields || []).filter(field => field.operation === "count");
    const countsCorrect = countFields.every(field => byId[field.id] && byId[field.id].isCorrect);
    const grades = gradeConstructRows(p, results);
    return countsCorrect && grades.every(grade => grade.isCorrect);
  }
  const grades = gradeConstructRows(p, results);
  return grades.length ? grades.every(grade => grade.isCorrect) : results.every(r => r.isCorrect);
}

function focusForErrorCode(code){
  if (code === "PART_MINUS_PART" || code === "WHOLE_NOT_FIRST" || code === "WRONG_WHOLE" || code === "TRUE_BUT_OTHER_FAMILY") return "wholeFirst";
  if (code === "PICTURE_PART_COUNT_ERROR" || code === "PICTURE_WHOLE_COUNT_ERROR" || code === "PICTURE_ADDITION_ARITHMETIC_ERROR") return "pictureToEquation";
  if (code === "ARITHMETIC_ERROR") return "subtractionRecall";
  if (code === "PARTS_NOT_SWITCHED" || code === "WRONG_PART_POSITION" || code === "DUPLICATE_SUBTRACTION") return "addToSubTransfer";
  return "addToSubTransfer";
}

   6. ADAPTIVE CONFIG: validate + apply
   ========================================================================= */
function parseFamilyEntry(value, max){
  const s = String(value || "").replace(/\s/g, "");
  const m = s.match(/^(\d+)\+(\d+)=(\d+)$/);
  if (!m) return null;
  const a = Number(m[1]), b = Number(m[2]), whole = Number(m[3]);
  if (!Number.isInteger(a) || !Number.isInteger(b) || !Number.isInteger(whole)) return null;
  if (a < 1 || b < 1 || a + b !== whole || whole > max) return null;
  return canonFamilyId(a, b);
}

function parseFactEntry(value, max){
  const s = String(value || "").replace(/\s/g, "");
  let m = s.match(/^(\d+)\+(\d+)$/);
  if (m){
    const a = Number(m[1]), b = Number(m[2]);
    if (a >= 1 && b >= 1 && a + b <= max) return `${Math.min(a,b)}+${Math.max(a,b)}`;
    return null;
  }
  m = s.match(/^(\d+)-(\d+)$/);
  if (!m) return null;
  const whole = Number(m[1]), part = Number(m[2]);
  if (whole >= 2 && whole <= max && part >= 1 && part < whole) return `${whole}-${part}`;
  return null;
}

// Returns { ok, config, errors[] }. NEVER throws. Drops bad bits, clamps the rest.
function validateConfig(raw){
  const errors = [];
  let obj = raw;
  if (typeof raw === "string"){
    try { obj = JSON.parse(raw); }
    catch(e){ return { ok: false, config: null, errors: ["Not valid JSON: " + e.message] }; }
  }
  if (!obj || typeof obj !== "object" || Array.isArray(obj)){
    return { ok: false, config: null, errors: ["Config must be a JSON object."] };
  }
  const c = JSON.parse(JSON.stringify(DEFAULT_CONFIG));   // start from defaults
  c.schemaVersion = SCHEMA_VERSION;
  if (obj.schemaVersion && obj.schemaVersion !== SCHEMA_VERSION)
    errors.push(`schemaVersion ${obj.schemaVersion} != app ${SCHEMA_VERSION} (loading anyway).`);
  if (typeof obj.configId === "string") c.configId = obj.configId.slice(0, 80);
  if (typeof obj.createdBy === "string") c.createdBy = obj.createdBy.slice(0, 40);
  if (typeof obj.note === "string") c.note = obj.note.slice(0, 400);

  if (obj.numberRange && typeof obj.numberRange === "object"){
    c.numberRange.max = clamp(obj.numberRange.max, 5, 20);
    c.numberRange.min = clamp(obj.numberRange.min != null ? obj.numberRange.min : 0, 0, c.numberRange.max - 1);
  }
  if (obj.sessionLength != null) c.sessionLength = Math.round(clamp(obj.sessionLength, 3, 12));
  if (obj.ttsRate != null) c.ttsRate = clamp(obj.ttsRate, 0.6, 1.4);

  const cleanList = (arr, parser, label) => {
    if (arr == null) return [];
    if (!Array.isArray(arr)){ errors.push(`${label} should be a list — ignored.`); return []; }
    const good = [];
    for (const s of arr){
      const parsed = typeof s === "string" ? parser(s, c.numberRange.max) : null;
      if (parsed) good.push(parsed);
      else errors.push(`Dropped malformed ${label} entry: ${JSON.stringify(s)}`);
    }
    return [...new Set(good)];
  };
  c.emphasizeFamilies = cleanList(obj.emphasizeFamilies, parseFamilyEntry, "emphasizeFamilies");
  c.avoidFamilies     = cleanList(obj.avoidFamilies, parseFamilyEntry, "avoidFamilies");
  c.emphasizeFacts    = cleanList(obj.emphasizeFacts, parseFactEntry, "emphasizeFacts");

  if (obj.problemTypeMix && typeof obj.problemTypeMix === "object"){
    const mix = {}; let sum = 0;
    for (const t of PROBLEM_TYPES){ const v = Math.max(0, Number(obj.problemTypeMix[t]) || 0); mix[t] = v; sum += v; }
    if (sum > 0){ for (const t of PROBLEM_TYPES) mix[t] = mix[t] / sum; c.problemTypeMix = mix; }
    else errors.push("problemTypeMix summed to 0 — kept defaults.");
  }
  if (obj.hintBehavior && typeof obj.hintBehavior === "object"){
    if (obj.hintBehavior.autoHintAfterWrong != null)
      c.hintBehavior.autoHintAfterWrong = Math.round(clamp(obj.hintBehavior.autoHintAfterWrong, 0, 5));
    c.hintBehavior.alwaysOfferMorph = obj.hintBehavior.alwaysOfferMorph !== false;
  }
  if (obj.mastery && typeof obj.mastery === "object"){
    if (obj.mastery.streakToMaster != null)
      c.mastery.streakToMaster = Math.round(clamp(obj.mastery.streakToMaster, 1, 8));
    c.mastery.demoteOnMiss = obj.mastery.demoteOnMiss !== false;
  }
  return { ok: true, config: c, errors };
}

function applyConfig(cfg){
  state.config = cfg;
  persistConfig();
}
