function buildStory(type, fam, knownPart, knownIsA){
  const ctx = CONTEXTS[rand(0, CONTEXTS.length - 1)];
  const colA = ctx.a, colB = ctx.b;
  if (type === "ADD"){
    return {
      text: `${fam.a} ${colA} ${ctx.noun} and ${fam.b} ${colB} ${ctx.noun}. How many ${ctx.noun} in all?`,
      ctx, colA, colB,
    };
  }
  // subtraction framings (SUB1/SUB2/CONNECT): "whole; some are X; how many are Y?"
  const knownColor = knownIsA ? colA : colB;
  const otherColor = knownIsA ? colB : colA;
  return {
    text: `${fam.whole} ${ctx.noun}. ${knownPart} are ${knownColor}. How many are ${otherColor}?`,
    ctx, colA, colB, knownColor, otherColor,
  };
}

function makeField(id, before, expected, after, fact, operation, extra){
  return {
    id,
    before,
    expected,
    after: after || "",
    fact,
    operation,
    factCanonical: `${before.replace(/\s/g, "")}${expected}${after ? after.replace(/\s/g, "") : ""}`,
    ...(extra || {}),
  };
}

function equationText(field){
  return `${field.before} ${field.expected}${field.after ? " " + field.after : ""}`.replace(/\s+/g, " ").trim();
}

function makeStructuralField(id, expected, role, fact, extra){
  return makeField(id, "", expected, "", fact, "structure", {
    role,
    representation: "equation",
    tracksMastery: false,
    ...(extra || {}),
  });
}

function makeConstructRow(label, fieldIds, expected, skill){
  return { label, fieldIds, expected, skill };
}

function addField(fields, id, expected, role, fact, extra){
  const field = makeStructuralField(id, expected, role, fact, extra);
  fields.push(field);
  return { type: "field", id };
}

function knownPart(value, cls){
  return { type: "text", text: String(value), className: cls || "known" };
}

function makePictureField(id, expected, role, operation, fact, extra){
  return makeField(id, "", expected, "", fact, operation, {
    role,
    representation: "picture",
    tracksMastery: false,
    ...(extra || {}),
  });
}

function pictureRow(id, label, stage, fieldIds, expected, skill, parts){
  return { id, label, stage, fieldIds, expected, skill, parts };
}

function pictureRowsForStage(p, stageIndex){
  const stage = (p.pictureStages || [])[stageIndex];
  if (!stage) return [];
  const rowIds = new Set(stage.rowIds || []);
  return (p.constructRows || []).filter(row => rowIds.has(row.id));
}

function pictureFieldIdsForStage(p, stageIndex){
  return [...new Set(pictureRowsForStage(p, stageIndex).flatMap(row => row.fieldIds || []))];
}

function pictureStagePrompt(p, stageIndex){
  const stage = (p.pictureStages || [])[stageIndex];
  return stage ? stage.prompt : p.problemText;
}

function generateFactFamilyProblem(typeOverride, options){
  options = options || {};
  const cfg = state.config;
  const pool = familiesInRange(cfg);
  const focus = derivePracticeFocus();
  const type = typeOverride || weightedType(focusedTypeMix(cfg.problemTypeMix, focus));
  let fam = null;
  if (options.familyOverride){
    const overridden = familyFromId(options.familyOverride);
    if (overridden && overridden.whole <= clamp(cfg.numberRange.max, 2, 20) &&
        (!needsDistinctParts(type) || overridden.a !== overridden.b)){
      fam = overridden;
    }
  }
  if (!fam) fam = selectWeightedFamily(pool, type, cfg, focus);
  const fact = relevantFact(type, fam);
  const story = buildStory(type, fam, fam.a, true);
  const scaffoldLevel = options.scaffoldLevel || deriveScaffoldLevel();
  let prompt, givenEquation = "", fields = [], visual = false, operation = "addition";
  let constructRows = null, numberTiles = null, choiceOptions = null, pictureStages = null;

  if (type === "PICTURE_FAMILY"){
    operation = "structure";
    visual = true;
    prompt = scaffoldLevel >= 4
      ? "Use the picture to write an addition and a matching subtraction."
      : "Use the picture to count the parts, find the whole, and write the matching equations.";
    fields = [];
    constructRows = [];
    pictureStages = [];
    const showRowLabels = scaffoldLevel <= 2;
    const addFieldRef = (id, expected, role, op, rowFact, skill) => {
      fields.push(makePictureField(id, expected, role, op, rowFact, { skill }));
      return { type: "field", id };
    };
    const textPart = (text, cls) => ({ type: "text", text, className: cls || "known" });
    const addRow = pictureRow("pictureAdd", showRowLabels ? "addition" : "", "addition",
      ["picAddLeft", "picAddRight", "picAddWhole"],
      [fam.a, fam.b, fam.whole],
      "pictureAddition",
      [
        addFieldRef("picAddLeft", fam.a, "addend", "addition", `${fam.a}+${fam.b}`, "pictureToAddition"),
        textPart("+", "op"),
        addFieldRef("picAddRight", fam.b, "addend", "addition", `${fam.a}+${fam.b}`, "pictureToAddition"),
        textPart("=", "equals"),
        addFieldRef("picAddWhole", fam.whole, "sum", "addition", `${fam.a}+${fam.b}`, "pictureToAddition"),
      ]);
    const subRow = pictureRow("pictureSub", showRowLabels ? "subtraction" : "", "subtraction",
      ["picSubWhole", "picSubPart", "picSubAnswer"],
      [fam.whole, fam.a, fam.b],
      "pictureSubtraction",
      [
        addFieldRef("picSubWhole", fam.whole, "whole", "subtraction", `${fam.whole}-${fam.a}`, "wholeFirst"),
        textPart("−", "op"),
        addFieldRef("picSubPart", fam.a, "subtrahend", "subtraction", `${fam.whole}-${fam.a}`, "pictureToSubtraction"),
        textPart("=", "equals"),
        addFieldRef("picSubAnswer", fam.b, "difference", "subtraction", `${fam.whole}-${fam.a}`, "pictureToSubtraction"),
      ]);
    let secondSubRow = null;
    if (scaffoldLevel === 3){
      secondSubRow = pictureRow("pictureSubSwitch", "", "secondSubtraction",
        ["picSub2Whole", "picSub2Part", "picSub2Answer"],
        [fam.whole, fam.b, fam.a],
        "pictureSubtraction",
        [
          addFieldRef("picSub2Whole", fam.whole, "whole", "subtraction", `${fam.whole}-${fam.b}`, "wholeFirst"),
          textPart("−", "op"),
          addFieldRef("picSub2Part", fam.b, "subtrahend", "subtraction", `${fam.whole}-${fam.b}`, "companionSubtraction"),
          textPart("=", "equals"),
          addFieldRef("picSub2Answer", fam.a, "difference", "subtraction", `${fam.whole}-${fam.b}`, "companionSubtraction"),
        ]);
    }
    if (scaffoldLevel <= 2){
      const countRows = [
        pictureRow("countA", "part", "count", ["picCountA"], [fam.a], "pictureCount",
          [textPart(`${cap(story.colA)} dots`), addFieldRef("picCountA", fam.a, "partA", "count", fam.id, "countFirstGroup")]),
        pictureRow("countB", "part", "count", ["picCountB"], [fam.b], "pictureCount",
          [textPart(`${cap(story.colB)} dots`), addFieldRef("picCountB", fam.b, "partB", "count", fam.id, "countSecondGroup")]),
        pictureRow("countWhole", "whole", "count", ["picCountWhole"], [fam.whole], "pictureCount",
          [textPart("All dots"), addFieldRef("picCountWhole", fam.whole, "whole", "count", fam.id, "identifyWhole")]),
      ];
      countRows[0].role = "part";
      countRows[1].role = "part";
      countRows[2].role = "whole";
      constructRows.push(...countRows, addRow, subRow);
      pictureStages.push(
        { id: "count", prompt: "Count each colored part. Then count all the dots together.", rowIds: ["countA", "countB", "countWhole"] },
        { id: "addition", prompt: "Addition joins the two parts. Write the addition from the picture.", rowIds: ["pictureAdd"] },
        { id: "subtraction", prompt: "Subtraction starts with the whole and finds one part.", rowIds: ["pictureSub"] },
      );
    } else if (scaffoldLevel === 3){
      constructRows.push(addRow, subRow, secondSubRow);
      pictureStages.push(
        { id: "addition", prompt: "Write an addition that matches the picture.", rowIds: ["pictureAdd"] },
        { id: "subtraction", prompt: "Write a subtraction that starts with the whole.", rowIds: ["pictureSub"] },
        { id: "secondSubtraction", prompt: "Now write the other subtraction from the same picture.", rowIds: ["pictureSubSwitch"] },
      );
    } else {
      constructRows.push(addRow, subRow);
      pictureStages.push({
        id: "independent",
        prompt: "Use the picture to fill both equations.",
        rowIds: ["pictureAdd", "pictureSub"],
      });
    }
  } else if (type === "COMPANION"){
    operation = "structure";
    const givenSub = Math.random() < .5 ? fam.a : fam.b;
    const givenAnswer = fam.whole - givenSub;
    const companionSub = givenAnswer;
    const companionAnswer = givenSub;
    const companionFact = `${fam.whole}-${companionSub}`;
    prompt = "Make the matching subtraction. The whole stays first. The parts switch places.";
    givenEquation = `${fam.whole} − ${givenSub} = ${givenAnswer}`;
    numberTiles = shuffled(buildNumberTiles(fam, scaffoldLevel <= 2));
    constructRows = [makeConstructRow("match", ["compWhole", "compSub", "compAnswer"], [fam.whole, companionSub, companionAnswer], "companionSubtraction")];
    fields = [];
    const rowParts = [];
    if (scaffoldLevel === 1){
      fields.push(makeStructuralField("compWhole", fam.whole, "whole", companionFact, { locked: true, skill: "wholeFirst" }));
      rowParts.push(knownPart(fam.whole, "known blankish whole-lock"));
    } else {
      rowParts.push(addField(fields, "compWhole", fam.whole, "whole", companionFact, { skill: "wholeFirst" }));
    }
    rowParts.push({ type:"text", text:"−", className:"op" });
    rowParts.push(addField(fields, "compSub", companionSub, "subtrahend", companionFact, { skill: "companionSubtraction" }));
    rowParts.push({ type:"text", text:"=", className:"equals" });
    rowParts.push(addField(fields, "compAnswer", companionAnswer, "difference", companionFact, { skill: "companionSubtraction" }));
    constructRows[0].parts = rowParts;
  } else if (type === "ADD_TO_SUB"){
    operation = "structure";
    prompt = "Use the addition to make both matching subtractions.";
    givenEquation = `${fam.a} + ${fam.b} = ${fam.whole}`;
    numberTiles = shuffled(buildNumberTiles(fam, scaffoldLevel <= 2));
    fields = [];
    constructRows = [
      makeConstructRow("first", ["addSubWholeA", "addSubPartA", "addSubAnswerA"], [fam.whole, fam.a, fam.b], "additionToSubtraction"),
      makeConstructRow("second", ["addSubWholeB", "addSubPartB", "addSubAnswerB"], [fam.whole, fam.b, fam.a], "additionToSubtraction"),
    ];
    constructRows.forEach((row, idx) => {
      const [whole, subtrahend, answer] = row.expected;
      const rowFact = `${whole}-${subtrahend}`;
      const ids = row.fieldIds;
      row.parts = [];
      if (scaffoldLevel === 1){
        fields.push(makeStructuralField(ids[0], whole, "whole", rowFact, { locked: true, skill: "wholeFirst" }));
        row.parts.push(knownPart(whole, "known blankish whole-lock"));
      } else {
        row.parts.push(addField(fields, ids[0], whole, "whole", rowFact, { skill: "wholeFirst" }));
      }
      row.parts.push({ type:"text", text:"−", className:"op" });
      row.parts.push(addField(fields, ids[1], subtrahend, "subtrahend", rowFact, { skill: "additionToSubtraction" }));
      row.parts.push({ type:"text", text:"=", className:"equals" });
      row.parts.push(addField(fields, ids[2], answer, "difference", rowFact, { skill: "additionToSubtraction" }));
      row.label = idx === 0 ? "one way" : "switch";
    });
  } else if (type === "NOT_FAMILY"){
    operation = "structure";
    const correctSub = Math.random() < .5 ? fam.a : fam.b;
    const correctAnswer = fam.whole - correctSub;
    const partWhole = Math.max(fam.a, fam.b);
    const partSub = Math.min(fam.a, fam.b);
    prompt = "Which subtraction belongs to this family?";
    numberTiles = shuffled(buildNumberTiles(fam, true));
    choiceOptions = shuffled([
      {
        id: "family",
        text: `${fam.whole} − ${correctSub} = ${correctAnswer}`,
        isCorrect: true,
        arithmeticCorrect: true,
        familyCorrect: true,
      },
      {
        id: "partMinusPart",
        text: `${partWhole} − ${partSub} = ${partWhole - partSub}`,
        isCorrect: false,
        arithmeticCorrect: true,
        familyCorrect: false,
        errorCode: "PART_MINUS_PART",
        feedback: `That equation is true, but it belongs to a different family. This family's whole is ${fam.whole}, so subtraction starts with ${fam.whole}.`,
      },
    ]);
    fields = [makeStructuralField("choice", "family", "familyChoice", `${fam.whole}-${correctSub}`, { skill: "familyDiscrimination" })];
  } else if (type === "WHOLE_FIRST"){
    operation = "structure";
    prompt = "Which number is the whole? Subtraction in this family starts with the whole.";
    numberTiles = shuffled(buildNumberTiles(fam, false));
    choiceOptions = shuffled([
      { id: "whole", text: String(fam.whole), isCorrect: true, arithmeticCorrect: null, familyCorrect: true },
      { id: "partA", text: String(fam.a), isCorrect: false, arithmeticCorrect: null, familyCorrect: false, errorCode: "WRONG_WHOLE", feedback: `${fam.a} is a part. The whole is ${fam.whole}.` },
      { id: "partB", text: String(fam.b), isCorrect: false, arithmeticCorrect: null, familyCorrect: false, errorCode: "WRONG_WHOLE", feedback: `${fam.b} is a part. The whole is ${fam.whole}.` },
    ]);
    fields = [makeStructuralField("choice", "whole", "wholeChoice", `${fam.whole}-${fam.a}`, { skill: "identifyWhole" })];
  } else if (type === "ADD"){
    prompt = "Solve the addition. Then write two subtractions that match.";
    fields = [
      makeField("sum", `${fam.a} + ${fam.b} =`, fam.whole, "", `${fam.a}+${fam.b}`, "addition", { skill: "additionRecall", representation: "equation" }),
      makeField("subA", `${fam.whole} − ${fam.a} =`, fam.b, "", `${fam.whole}-${fam.a}`, "subtraction", { skill: "additionToSubtraction", representation: "equation" }),
      makeField("subB", `${fam.whole} − ${fam.b} =`, fam.a, "", `${fam.whole}-${fam.b}`, "subtraction", { skill: "companionSubtraction", representation: "equation" }),
    ];
  } else if (type === "SUB1"){
    operation = "subtraction";
    prompt = "Solve the subtraction. Then write an addition to match the subtraction.";
    fields = [
      makeField("subA", `${fam.whole} − ${fam.a} =`, fam.b, "", `${fam.whole}-${fam.a}`, "subtraction", { skill: "subtractionRecall", representation: "equation" }),
      makeField("addA", `${fam.a} +`, fam.b, `= ${fam.whole}`, `${fam.a}+${fam.b}`, "addition", { skill: "subtractionToAddition", representation: "equation" }),
    ];
  } else if (type === "SUB2"){
    operation = "subtraction";
    prompt = "Solve the subtraction. Then write an addition to match the subtraction.";
    fields = [
      makeField("subB", `${fam.whole} − ${fam.b} =`, fam.a, "", `${fam.whole}-${fam.b}`, "subtraction", { skill: "subtractionRecall", representation: "equation" }),
      makeField("addB", `${fam.b} +`, fam.a, `= ${fam.whole}`, `${fam.a}+${fam.b}`, "addition", { skill: "subtractionToAddition", representation: "equation" }),
    ];
  } else {
    operation = "addition";
    visual = true;
    prompt = "Write an addition that matches the picture. Then write a subtraction to match the addition.";
    fields = [
      makeField("picAddA", "", fam.a, `+ ${fam.b} = ${fam.whole}`, `${fam.a}+${fam.b}`, "addition", { skill: "pictureToAddition", representation: "picture" }),
      makeField("picSubA", `${fam.whole} −`, fam.a, `= ${fam.b}`, `${fam.whole}-${fam.a}`, "subtraction", { skill: "pictureToSubtraction", representation: "picture" }),
    ];
  }

  const primary = fields[0] || makeField("meta", "", fam.whole, "", fact, operation);
  const canonical = isPictureFamilyType(type)
    ? `${fam.a}+${fam.b}=${fam.whole};${fam.whole}-${fam.a}=${fam.b}`
    : constructRows
    ? constructRows.map(row => `${row.expected[0]}-${row.expected[1]}=${row.expected[2]}`).join(";")
    : choiceOptions
      ? (choiceOptions.find(o => o.isCorrect)?.text || "")
      : equationText(primary).replace(/\s/g, "");

  return {
    id: uid(),
    mode: "factFamily",
    problemType: type,
    factFamilyId: fam.id,
    a: fam.a, b: fam.b, whole: fam.whole,
    fact: primary.fact,
    factCanonical: canonical.replace(/\s/g, ""),
    operation,
    knownPart: type === "ADD" ? null : (type === "SUB2" ? fam.b : fam.a),
    knownIsA: type !== "SUB2",
    story,
    problemText: prompt,
    plannedType: options.plannedType || type,
    skill: primary.skill || null,
    representation: primary.representation || (visual ? "picture" : "equation"),
    givenEquation,
    visual,
    fields,
    constructRows,
    pictureStages,
    pictureLabels: isPictureFamilyType(type) && scaffoldLevel <= 2,
    numberTiles,
    choiceOptions,
    scaffoldLevel,
    correctAnswer: primary.expected,
    range: clamp(cfg.numberRange.max, 5, 20),
    configId: cfg.configId || null,
    focusId: focus.id,
    focusLabel: focus.label,
    focusReason: focus.reason,
    focusTargets: { facts: focus.targetFacts, families: focus.targetFamilies },
  };
}

/* =========================================================================
   9. SESSION FLOW
   ========================================================================= */
function startSession(){
  const focus = derivePracticeFocus();
  const anchorFamily = selectSessionAnchorFamily(focus);
  state.session = {
    id: uid(),
    startedAt: nowIso(),
    length: state.config.sessionLength,
    typePlan: buildSessionTypePlan(state.config, focus.score > 0 ? focus : null),
    focusId: focus.id,
    anchorFamilyId: anchorFamily ? anchorFamily.id : null,
    index: 0,                 // 0-based problem number within session
    results: [],              // booleans (correctFirstTry) for the dots
  };
  state.screen = "play";
  beginNextProblem();
}

function selectSessionAnchorFamily(focus){
  const pool = familiesInRange(state.config);
  const preferred = (focus && focus.targetFamilies || [])
    .map(id => familyFromId(id))
    .find(fam => fam && fam.whole <= state.config.numberRange.max && fam.a !== fam.b);
  return preferred || selectWeightedFamily(pool, "PICTURE_FAMILY", state.config, focus || null);
}

function recentMissRecord(){
  for (let i = state.problemLog.length - 1; i >= 0; i--){
    const record = state.problemLog[i];
    if (record && record.mode === "factFamily" && !record.correctFirstTry) return record;
  }
  return null;
}

function resolveReviewPlan(){
  const miss = recentMissRecord();
  if (miss){
    const signal = (miss.deficitSignals || [])[0];
    const focusId = signal && signal.id ? signal.id : (miss.focusId || "pictureToEquation");
    return {
      type: (typesForFocus(focusId)[0] || "PICTURE_FAMILY"),
      familyId: miss.factFamilyId || null,
    };
  }
  const focus = derivePracticeFocus();
  return {
    type: (typesForFocus(focus.id)[0] || "PICTURE_FAMILY"),
    familyId: (focus.targetFamilies || [])[0] || (state.session && state.session.anchorFamilyId) || null,
  };
}

function scaffoldForPlannedProblem(type){
  if (type !== "PICTURE_FAMILY" || !state.session || !state.session.typePlan) return null;
  const plan = state.session.typePlan;
  const index = state.session.index;
  const pictureIndexes = plan
    .map((t, i) => t === "PICTURE_FAMILY" ? i : -1)
    .filter(i => i >= 0);
  const occurrence = pictureIndexes.indexOf(index);
  if (occurrence === -1) return null;
  const base = deriveSkillScaffoldLevel("pictureToSubtraction");
  if (occurrence === 0) return Math.max(1, Math.min(2, base));
  return Math.max(2, Math.min(3, base + 1));
}

function deriveSkillScaffoldLevel(skillId){
  const samples = [];
  for (const record of state.problemLog.slice(-80)){
    for (const answer of answerEntries(record)){
      if (answer.skill === skillId){
        samples.push({
          correct: answer.correctFirstTry,
          hinted: Boolean(record.hintUsed) || Boolean(record.modeledAnswer),
          sessionId: record.sessionId,
        });
      }
    }
  }
  if (samples.length < 6) return 1;
  const recent = samples.slice(-12);
  const sessions = new Set(recent.map(s => s.sessionId).filter(Boolean)).size;
  const independent = recent.filter(s => s.correct && !s.hinted).length;
  const rate = independent / recent.length;
  if (recent.slice(-4).some(s => !s.correct || s.hinted)) return 1;
  if (sessions >= 2 && recent.length >= 10 && rate >= .85) return 3;
  if (rate >= .7) return 2;
  return 1;
}

function beginNextProblem(){
  const plannedType = state.session && state.session.typePlan ? state.session.typePlan[state.session.index] : null;
  const review = plannedType === REVIEW_SLOT ? resolveReviewPlan() : null;
  const type = review ? review.type : plannedType;
  const scaffoldLevel = scaffoldForPlannedProblem(type);
  const familyOverride = review ? review.familyId : (state.session && state.session.anchorFamilyId);
  state.problem = generateFactFamilyProblem(type, {
    scaffoldLevel,
    familyOverride,
    plannedType: plannedType || type,
  });
  state.lastKey = state.problem.factFamilyId + "|" + state.problem.problemType;
  state.view = {
    answers: {},
    attempts: 0,
    firstAnswer: null,
    firstAnswers: null,
    firstResultById: {},
    firstFieldResults: null,
    fieldResults: {},
    pictureStageIndex: 0,
    pictureStageAttempts: {},
    forcePictureLabels: false,
    modeledAnswer: false,
    hintSequence: [],
    selectedChoice: null,
    hintUsed: false,
    morphViewed: false,
    showMorph: false,
    solved: false,
    feedback: null,
    startedAt: Date.now(),
  };
  render();
  // Read the problem aloud shortly after paint.
  setTimeout(() => speak(spokenPrompt(state.problem)), 250);
}

function spokenPrompt(p){
  return isPictureFamilyType(p.problemType) ? pictureStagePrompt(p, 0) : p.problemText;
}

function resultForField(field, raw){
  const numeric = Number(raw);
  return {
    id: field.id,
    fact: field.fact,
    operation: field.operation,
    role: field.role || null,
    skill: field.skill || null,
    representation: field.representation || null,
    expected: field.expected,
    submitted: raw === "" ? null : numeric,
    isCorrect: raw !== "" && Number.isInteger(numeric) && numeric === field.expected,
    tracksMastery: field.tracksMastery !== false,
    locked: Boolean(field.locked),
  };
}

function rememberFirstResults(results){
  const v = state.view;
  if (v.firstAnswers === null) v.firstAnswers = {};
  if (!v.firstResultById) v.firstResultById = {};
  for (const result of results){
    if (!Object.prototype.hasOwnProperty.call(v.firstResultById, result.id)){
      v.firstResultById[result.id] = Object.assign({}, result);
      v.firstAnswers[result.id] = result.submitted;
      if (v.firstAnswer === null) v.firstAnswer = result.submitted;
    }
  }
  v.firstFieldResults = state.problem.fields
    .map(field => v.firstResultById[field.id])
    .filter(Boolean)
    .map(result => Object.assign({}, result));
}

function checkPictureFamily(){
  const p = state.problem, v = state.view;
  if (v.solved) return;
  v.attempts++;
  const stageIndex = v.pictureStageIndex || 0;
  const stage = (p.pictureStages || [])[stageIndex] || { id: `stage${stageIndex}` };
  const stageId = stage.id || `stage${stageIndex}`;
  const stageRows = pictureRowsForStage(p, stageIndex);
  const stageFieldIds = new Set(pictureFieldIdsForStage(p, stageIndex));
  if (!v.pictureStageAttempts) v.pictureStageAttempts = {};
  v.pictureStageAttempts[stageId] = (v.pictureStageAttempts[stageId] || 0) + 1;
  const stageAttempts = v.pictureStageAttempts[stageId];
  const answers = Object.assign({}, v.answers);
  for (const field of p.fields){
    if (!stageFieldIds.has(field.id)) continue;
    const input = document.querySelector(`[data-answer-id="${field.id}"]`);
    answers[field.id] = input ? input.value.trim() : "";
  }
  v.answers = answers;
  const results = p.fields
    .filter(field => stageFieldIds.has(field.id))
    .map(field => resultForField(field, answers[field.id]));
  const stageProblem = Object.assign({}, p, { constructRows: stageRows });
  applyConstructRowGrades(stageProblem, results);
  v.fieldResults = Object.assign({}, v.fieldResults, Object.fromEntries(results.map(r => [r.id, r])));
  rememberFirstResults(results);

  const allCorrect = results.length > 0 && results.every(result => result.isCorrect);
  if (allCorrect){
    if (stageIndex + 1 < (p.pictureStages || []).length){
      v.pictureStageIndex = stageIndex + 1;
      v.feedback = { kind: "correct", text: pictureStagePrompt(p, v.pictureStageIndex) };
      speak(v.feedback.text);
    } else {
      v.solved = true;
      v.feedback = { kind: "correct", text: "Yes. The picture, addition, and subtraction all match." };
      speak(v.feedback.text);
    }
  } else {
    const structuralErrors = structuralErrorsForProblem(stageProblem, results);
    v.feedback = { kind: "wrong", text: structuralFeedback(p, structuralErrors) };
    const hintStep = (step) => `${stageId}:${step}`;
    if (stageAttempts === 1 && !v.hintSequence.includes(hintStep("conceptualFeedback"))){
      v.hintSequence.push(hintStep("conceptualFeedback"));
    }
    if (stageAttempts === 2 && !v.hintSequence.includes(hintStep("addedScaffold"))){
      v.forcePictureLabels = true;
      v.hintUsed = true;
      v.hintSequence.push(hintStep("addedScaffold"));
    }
    if (stageAttempts >= 3 && !v.hintSequence.includes(hintStep("modeledRelationship"))){
      v.forcePictureLabels = true;
      v.hintUsed = true;
      v.modeledAnswer = true;
      v.solved = true;
      v.hintSequence.push(hintStep("modeledRelationship"));
      v.feedback = { kind: "wrong", text: `Let's model this one: ${p.a} + ${p.b} = ${p.whole}, and ${p.whole} − ${p.a} = ${p.b}. Try a new one next.` };
    }
    speak(v.feedback.text);
    if (state.config.hintBehavior.autoHintAfterWrong &&
        stageAttempts >= state.config.hintBehavior.autoHintAfterWrong){
      v.hintUsed = true;
    }
  }
  render();
}

function checkFactFamily(){
  const p = state.problem, v = state.view;
  if (v.solved) return;
  if (isPictureFamilyType(p.problemType)){
    checkPictureFamily();
    return;
  }
  v.attempts++;
  if (p.choiceOptions){
    const selected = p.choiceOptions.find(o => o.id === v.selectedChoice) || null;
    const correct = p.choiceOptions.find(o => o.isCorrect);
    const result = {
      id: "choice",
      fact: p.fact,
      operation: "structure",
      skill: p.fields[0]?.skill || null,
      representation: p.fields[0]?.representation || "equation",
      expected: correct ? correct.id : null,
      submitted: selected ? selected.id : null,
      isCorrect: Boolean(selected && selected.isCorrect),
      errorCode: selected && selected.errorCode ? selected.errorCode : (selected ? "WRONG_CHOICE" : "NO_CHOICE"),
      arithmeticCorrect: selected ? selected.arithmeticCorrect : null,
      familyCorrect: selected ? selected.familyCorrect : false,
      tracksMastery: false,
    };
    if (v.firstAnswers === null){
      v.firstAnswers = { choice: result.submitted };
      v.firstAnswer = result.submitted;
      v.firstFieldResults = [Object.assign({}, result)];
    }
    v.answers = { choice: result.submitted };
    v.fieldResults = { choice: result };
    if (result.isCorrect){
      v.solved = true;
      v.feedback = { kind: "correct", text: p.problemType === "WHOLE_FIRST" ? "Yes. That is the whole." : "Yes. That subtraction belongs to this family." };
      speak(v.feedback.text);
    } else {
      const msg = selected && selected.feedback ? selected.feedback : "Choose the equation that starts with this family's whole.";
      v.feedback = { kind: "wrong", text: msg };
      speak(msg);
      if (state.config.hintBehavior.autoHintAfterWrong &&
          v.attempts >= state.config.hintBehavior.autoHintAfterWrong){
        v.hintUsed = true;
      }
    }
    render();
    return;
  }
  const answers = {};
  for (const field of p.fields){
    if (field.locked){
      answers[field.id] = String(field.expected);
    } else {
      const input = document.querySelector(`[data-answer-id="${field.id}"]`);
      answers[field.id] = input ? input.value.trim() : "";
    }
  }
  v.answers = answers;
  const results = p.fields.map(field => resultForField(field, answers[field.id]));
  applyConstructRowGrades(p, results);
  if (v.firstAnswers === null){
    v.firstAnswers = Object.assign({}, answers);
    const primaryResult = results.find(r => !r.locked) || results[0];
    v.firstAnswer = primaryResult ? primaryResult.submitted : null;
    v.firstFieldResults = results.map(r => Object.assign({}, r));
  }
  v.fieldResults = Object.fromEntries(results.map(r => [r.id, r]));
  const allCorrect = results.every(result => result.isCorrect);

  if (allCorrect){
    v.solved = true;
    v.feedback = { kind: "correct", text: isStructuralType(p.problemType) ? "Yes. The whole stayed first and the parts switched." : pickPraise() };
    speak(isStructuralType(p.problemType) ? v.feedback.text : `${v.feedback.text} These equations match.`);
  } else {
    const structuralErrors = structuralErrorsForProblem(p, results);
    v.feedback = { kind: "wrong", text: structuralFeedback(p, structuralErrors) };
    speak(v.feedback.text);
    if (state.config.hintBehavior.autoHintAfterWrong &&
        v.attempts >= state.config.hintBehavior.autoHintAfterWrong){
      v.hintUsed = true;
    }
  }
  render();
}

function pickPraise(){ return ["Great job!","You got it!","Nice work!","Brilliant!","Way to go!"][rand(0,4)]; }
function encourage(){ return `Check each equation. The same three numbers should match.`; }
function structuralFeedback(p, codes){
  if (isPictureFamilyType(p.problemType) && codes.includes("PICTURE_PART_COUNT_ERROR")){
    return `Count one colored part at a time. The two parts make one whole.`;
  }
  if (isPictureFamilyType(p.problemType) && codes.includes("PICTURE_WHOLE_COUNT_ERROR")){
    return `The whole means all the dots together. Count both parts together.`;
  }
  if (isPictureFamilyType(p.problemType) && codes.includes("PICTURE_ADDITION_ARITHMETIC_ERROR")){
    return `Those are the right picture parts. Check the addition total again.`;
  }
  if (isPictureFamilyType(p.problemType) && (codes.includes("PART_MINUS_PART") || codes.includes("TRUE_BUT_OTHER_FAMILY"))){
    return `That equation can be true, but it does not use all the dots in this picture. The whole is all ${p.whole} dots, so subtraction starts with ${p.whole}.`;
  }
  if (isPictureFamilyType(p.problemType) && codes.includes("ARITHMETIC_ERROR")){
    return `You started with the whole correctly. Cover one part. How many dots remain?`;
  }
  if (codes.includes("PART_MINUS_PART") || codes.includes("TRUE_BUT_OTHER_FAMILY")){
    return `That equation can be true, but it belongs to a different family. This family's whole is ${p.whole}, so subtraction starts with ${p.whole}.`;
  }
  if (codes.includes("WHOLE_NOT_FIRST") || codes.includes("WRONG_WHOLE")){
    return `The whole is ${p.whole}. Put the whole first in the subtraction.`;
  }
  if (codes.includes("ARITHMETIC_ERROR")){
    return `The whole is first. Now check the subtraction fact.`;
  }
  if (codes.includes("DUPLICATE_SUBTRACTION")){
    return `Use both subtraction facts. Keep ${p.whole} first, then switch the two parts.`;
  }
  if (codes.includes("PARTS_NOT_SWITCHED") || codes.includes("WRONG_PART_POSITION")){
    return `Keep ${p.whole} first. Then switch the two parts.`;
  }
  return encourage();
}

function showHint(){
  state.view.hintUsed = true;
  const p = state.problem;
  const msg = isPictureFamilyType(p.problemType)
    ? `Two parts make one whole. Addition joins ${p.a} and ${p.b} to make ${p.whole}. Subtraction starts with the whole, ${p.whole}, and finds one part.`
    : `${p.a}, ${p.b}, and ${p.whole} belong together. ${p.whole} is the whole, so subtraction starts with ${p.whole}. The parts, ${p.a} and ${p.b}, switch places.`;
  speak(msg);
  render();
}

function doMorph(){
  state.view.showMorph = true;
  state.view.morphViewed = true;
  const p = state.problem;
  speak(`${p.a} and ${p.b} make ${p.whole}. So, ${p.whole} take away ${p.a} leaves ${p.b}. And ${p.whole} take away ${p.b} leaves ${p.a}.`);
  render();
}

// Build the log record, update mastery, advance.
function recordProblemAndAdvance(){
  const p = state.problem, v = state.view;
  const firstResults = v.firstFieldResults || [];
  const correctFirstTry = firstResults.length > 0 && firstResults.every(result => result.isCorrect);
  const firstAnswerIsNumber = typeof v.firstAnswer === "number" && Number.isFinite(v.firstAnswer);
  const correctAnswerIsNumber = !isStructuralType(p.problemType) && typeof p.correctAnswer === "number" && Number.isFinite(p.correctAnswer);
  const structuralErrorCodes = structuralErrorsForProblem(p, firstResults);
  const record = {
    id: p.id,
    timestamp: nowIso(),
    sessionId: state.session.id,
    schemaVersion: SCHEMA_VERSION,
    mode: "factFamily",
    problemType: p.problemType,
    factFamilyId: p.factFamilyId,
    operands: { a: p.a, b: p.b, whole: p.whole },
    fact: p.fact,
    factCanonical: p.factCanonical,
    operation: p.operation,
    skill: p.skill || null,
    representation: p.representation || null,
    plannedType: p.plannedType || p.problemType,
    problemText: p.problemText,
    correctAnswer: p.correctAnswer,
    childAnswer: v.firstAnswer,
    errorValue: (firstAnswerIsNumber && correctAnswerIsNumber ? v.firstAnswer - p.correctAnswer : null),
    answers: p.fields.map(field => {
      const result = (v.fieldResults && v.fieldResults[field.id]) || {};
      const first = firstResults.find(item => item.id === field.id) || {};
      const loggedExpected = first.expected == null
        ? (result.expected == null ? field.expected : result.expected)
        : first.expected;
      return {
        id: field.id,
        fact: field.fact,
        operation: field.operation,
        role: field.role || null,
        skill: field.skill || null,
        representation: field.representation || null,
        correctAnswer: loggedExpected,
        childAnswer: first.submitted == null ? null : first.submitted,
        finalAnswer: result.submitted == null ? null : result.submitted,
        correctFirstTry: Boolean(first.isCorrect),
        errorCode: first.errorCode || null,
        arithmeticCorrect: first.arithmeticCorrect == null ? null : first.arithmeticCorrect,
        familyCorrect: first.familyCorrect == null ? null : first.familyCorrect,
      };
    }),
    structuralErrorCodes,
    arithmeticCorrect: structuralArithmeticCorrect(p, firstResults),
    familyCorrect: structuralFamilyCorrect(p, firstResults),
    scaffoldLevel: p.scaffoldLevel,
    attempts: v.attempts,
    correctFirstTry,
    strategyTag: v.strategyTag || null,
    hintUsed: v.hintUsed,
    hintSequence: v.hintSequence || [],
    modeledAnswer: Boolean(v.modeledAnswer),
    morphViewed: v.morphViewed,
    timeSpentMs: Date.now() - v.startedAt,
    range: p.range,
    configId: p.configId,
    focusId: p.focusId,
    focusLabel: p.focusLabel,
    focusReason: p.focusReason,
    focusTargets: p.focusTargets,
  };
  record.deficitSignals = classifyDeficitSignals(record).map(sig => ({
    id: sig.id,
    family: sig.family,
    facts: sig.facts,
    reason: sig.reason,
  }));
  state.problemLog.push(record);
  for (const result of firstResults){
    if (result.tracksMastery !== false && result.fact){
      factMasteryUpdate(result.fact, Boolean(result.isCorrect));
    }
  }
  // keep a short rolling memory of recent misses for the weighting
  for (const result of firstResults.filter(r => !r.isCorrect && r.fact)){
    state.recentMisses.push(result.fact);
  }
  if (state.recentMisses.length > 6) state.recentMisses = state.recentMisses.slice(-6);
  state.session.results.push(correctFirstTry);
  persistLogs();

  state.session.index++;
  if (state.session.index >= state.session.length){ finishSession(); }
  else { beginNextProblem(); }
}

function finishSession(){
  const s = state.session;
  s.endedAt = nowIso();
  s.summary = {
    total: s.results.length,
    firstTry: s.results.filter(Boolean).length,
  };
  state.sessionLog.push({
    id: s.id, mode: "factFamily", startedAt: s.startedAt, endedAt: s.endedAt,
    length: s.length, typePlan: s.typePlan || [], focusId: s.focusId || null, summary: s.summary,
  });
  persistLogs();
  state.screen = "summary";
  render();
}

function renderPictureModel(p){
  const showLabels = p.pictureLabels || Boolean(state.view && state.view.forcePictureLabels);
  const model = el("div", "picture-model" + (showLabels ? " whole-frame" : ""));
  if (!p.visual) return model;
  const groupA = el("div", "picture-group" + (showLabels ? " labeled" : ""));
  const groupB = el("div", "picture-group" + (showLabels ? " labeled" : ""));
  for (let i = 0; i < p.a; i++){
    const dot = el("span", "dot a");
    if (p.story && p.story.colA) dot.style.background = `var(--${p.story.colA})`;
    groupA.appendChild(dot);
  }
  for (let i = 0; i < p.b; i++){
    const dot = el("span", "dot b");
    if (p.story && p.story.colB) dot.style.background = `var(--${p.story.colB})`;
    groupB.appendChild(dot);
  }
  model.appendChild(groupA);
  model.appendChild(groupB);
  return model;
}

function renderEquationField(field){
  const row = el("div", "equation-row");
  appendEquationPart(row, field.before);
  const input = document.createElement("input");
  input.className = "blank";
  input.type = "number";
  input.inputMode = "numeric";
  input.min = "0";
  input.max = "20";
  input.dataset.answerId = field.id;
  input.value = state.view.answers[field.id] || "";
  input.disabled = state.view.solved;
  input.setAttribute("aria-label", "missing number");
  const result = state.view.fieldResults[field.id];
  if (result) input.classList.add(result.isCorrect ? "right" : "wrong");
  input.oninput = () => { state.view.answers[field.id] = input.value; };
  row.appendChild(input);
  appendEquationPart(row, field.after);
  return row;
}

function renderNumberBank(p){
  const bank = el("div", "number-bank");
  for (const tile of p.numberTiles || []){
    const t = el("div", "tile" + (tile.role === "whole" && tile.label ? " whole" : ""));
    t.appendChild(el("span", "num", String(tile.value)));
    if (tile.label) t.appendChild(el("span", "tag", tile.label));
    bank.appendChild(t);
  }
  return bank;
}

function renderConstructInput(field){
  const input = document.createElement("input");
  input.className = "blank";
  input.type = "number";
  input.inputMode = "numeric";
  input.min = "0";
  input.max = "20";
  input.dataset.answerId = field.id;
  input.value = state.view.answers[field.id] || "";
  input.disabled = state.view.solved;
  input.setAttribute("aria-label", field.role ? `missing ${field.role}` : "missing number");
  const result = state.view.fieldResults[field.id];
  if (result) input.classList.add(result.isCorrect ? "right" : "wrong");
  input.oninput = () => { state.view.answers[field.id] = input.value; };
  return input;
}

function renderConstructRows(p){
  const set = el("div", "equation-set");
  const fieldsById = Object.fromEntries(p.fields.map(f => [f.id, f]));
  const rows = isPictureFamilyType(p.problemType)
    ? pictureRowsForStage(p, state.view.pictureStageIndex || 0)
    : (p.constructRows || []);
  for (const rowDef of rows){
    const row = el("div", "equation-row");
    if (rowDef.label) row.appendChild(el("span", "label", rowDef.label));
    for (const part of rowDef.parts || []){
      if (part.type === "field"){
        row.appendChild(renderConstructInput(fieldsById[part.id]));
      } else {
        row.appendChild(el("span", part.className || "known", part.text));
      }
    }
    set.appendChild(row);
  }
  return set;
}

function renderChoiceOptions(p){
  const grid = el("div", "choice-grid");
  const result = state.view.fieldResults.choice;
  for (const option of p.choiceOptions || []){
    const b = el("button", "choice-btn", option.text);
    if (state.view.selectedChoice === option.id) b.classList.add("on");
    if (result && result.submitted === option.id) b.classList.add(result.isCorrect ? "right" : "wrong");
    b.disabled = state.view.solved;
    b.onclick = () => {
      if (state.view.selectedChoice !== option.id && !state.view.solved){
        state.view.fieldResults = {};
        state.view.feedback = null;
      }
      state.view.selectedChoice = option.id;
      render();
    };
    grid.appendChild(b);
  }
  return grid;
}

function appendEquationPart(row, text){
  if (!text) return;
  for (const token of text.trim().split(/\s+/)){
    const span = el("span", token === "+" || token === "−" ? "op" : token === "=" ? "equals" : "known", token);
    row.appendChild(span);
  }
}

function renderEquationSet(p){
  const set = el("div", "equation-set");
  if (p.givenEquation){
    const given = el("div", "equation-row given");
    for (const token of p.givenEquation.split(/\s+/)){
      given.appendChild(el("span", token === "+" || token === "−" ? "op" : token === "=" ? "equals" : "known", token));
    }
    set.appendChild(given);
  }
  if (p.numberTiles) set.appendChild(renderNumberBank(p));
  if (p.choiceOptions){
    set.appendChild(renderChoiceOptions(p));
    return set;
  }
  if (p.constructRows){
    set.appendChild(renderConstructRows(p));
    return set;
  }
  for (const field of p.fields) set.appendChild(renderEquationField(field));
  return set;
}

function renderPlay(){
  const p = state.problem, v = state.view;
  const wrap = el("div");
  wrap.appendChild(appbar("✖ Home", () => { if (confirmLeave()) { state.screen = "home"; render(); } }));

  const card = el("div", "card");

  // progress dots
  const dots = el("div", "progress-dots");
  for (let i = 0; i < state.session.length; i++){
    const d = el("i");
    if (i < state.session.index) d.classList.add(state.session.results[i] ? "done" : "now");
    else if (i === state.session.index) d.classList.add("now");
    dots.appendChild(d);
  }
  card.appendChild(dots);

  // story / prompt
  const story = el("div", "story");
  story.textContent = isPictureFamilyType(p.problemType)
    ? pictureStagePrompt(p, v.pictureStageIndex || 0)
    : p.problemText;
  card.appendChild(story);

  card.appendChild(renderPictureModel(p));
  card.appendChild(renderEquationSet(p));

  // feedback banner
  if (v.feedback){
    const ban = el("div", "banner " + v.feedback.kind, v.feedback.text);
    card.appendChild(ban);
  }

  // the connection reveal (morph) — sits right under the praise banner
  if (v.solved && isStructuralType(p.problemType)){
    card.appendChild(renderSwitchExplanation(p));
  }
  if (v.showMorph){
    card.appendChild(renderConnection(p));
  }

  // controls
  const ctr = el("div", "controls");
  if (!v.solved){
    const hint = el("button", "btn amber sm", "💡 Hint");
    hint.onclick = showHint;
    const check = el("button", "btn green", "✓ Check");
    check.onclick = debounce(checkFactFamily, 350);
    ctr.appendChild(hint); ctr.appendChild(check);
  } else {
    if (!isStructuralType(p.problemType) && state.config.hintBehavior.alwaysOfferMorph && !v.showMorph){
      const m = el("button", "btn purple", "✨ Show the connection");
      m.onclick = doMorph;
      ctr.appendChild(m);
    }
    const next = el("button", "btn green", state.session.index + 1 >= state.session.length ? "🎉 Finish" : "Next →");
    next.onclick = () => shouldAskStrategy() ? openStrategy() : recordProblemAndAdvance();
    ctr.appendChild(next);
  }
  card.appendChild(ctr);

  // hint detail
  if (v.hintUsed && !v.solved){
    const h = el("div", "banner wrong");
    h.textContent = isPictureFamilyType(p.problemType)
      ? `Two parts make one whole. ${p.a} + ${p.b} = ${p.whole}. Subtraction starts with the whole: ${p.whole} − one part = the other part.`
      : `${p.a} + ${p.b} = ${p.whole}, so ${p.whole} − ${p.a} = ${p.b} and ${p.whole} − ${p.b} = ${p.a}.`;
    card.appendChild(h);
  }

  wrap.appendChild(card);
  setTimeout(() => {
    const firstBlank = document.querySelector("[data-answer-id]:not(:disabled)");
    if (firstBlank) firstBlank.focus();
  }, 0);
  return wrap;
}

function renderConnection(p){
  const box = el("div", "connection");
  const eqs = [
    `<span class="add">${p.a} + ${p.b} = ${p.whole}</span>`,
    `<span class="sub">${p.whole} − ${p.a} = ${p.b}</span>`,
    `<span class="sub">${p.whole} − ${p.b} = ${p.a}</span>`,
  ];
  eqs.forEach((html, i) => {
    const e = el("div", "eq show");
    e.style.animationDelay = (i * 0.5) + "s";
    e.innerHTML = (i === 0 ? "" : "so … ") + html;
    box.appendChild(e);
  });
  return box;
}

function renderSwitchExplanation(p){

  box.appendChild(line);
  return box;

function renderFocusSummary(focus){

function renderStructureSignals(ff){
  const wrap = el("div", "transfer");
  const counts = {};
  for (const r of ff){
    for (const code of r.structuralErrorCodes || []) counts[code] = (counts[code] || 0) + 1;
  }
  const entries = Object.entries(counts).sort((a,b) => b[1] - a[1]);
  if (!entries.length){
    wrap.appendChild(el("div", "muted", ff.length ? "No structural misses logged yet." : "No data yet — play a session!"));
    return wrap;
  }
  for (const [code, count] of entries){
    const c = el("div", "tcell");
    c.innerHTML = `<b>${code}</b><br>${count} time${count === 1 ? "" : "s"}`;
    wrap.appendChild(c);
  }
  return wrap;
}

function masteredCount(){ return Object.values(state.mastery).filter(m => m.box >= 4).length; }

function renderTransfer(ff){
  // For each family, compare answer-row accuracy for addition vs subtraction.
  const byFam = {};
  for (const r of ff){
    const f = byFam[r.factFamilyId] || (byFam[r.factFamilyId] = { add:[0,0], sub:[0,0] });
    for (const a of answerEntries(r)){
      if (a.operation !== "addition" && a.operation !== "subtraction") continue;
      const slot = a.operation === "subtraction" ? f.sub : f.add;
      slot[1]++;
      if (a.correctFirstTry) slot[0]++;
    }
  }
  const wrap = el("div", "transfer");
  const fams = Object.keys(byFam).sort();
  if (!fams.length){ wrap.appendChild(el("div","muted","No data yet — play a session!")); return wrap; }
  for (const id of fams.slice(0, 12)){
    const f = byFam[id];
    const addPct = f.add[1] ? Math.round(100*f.add[0]/f.add[1]) + "%" : "–";
    const subPct = f.sub[1] ? Math.round(100*f.sub[0]/f.sub[1]) + "%" : "–";
    const c = el("div", "tcell");
    c.innerHTML = `<b>${id}</b><br>add ${addPct} · take&#8209;away ${subPct}`;
    wrap.appendChild(c);
  }
  return wrap;
}

function renderFactTable(){
  const facts = Object.keys(state.mastery);
  const t = el("table", "facts");
  t.innerHTML = "<tr><th>Fact</th><th>Box</th><th>Seen</th><th>Right</th></tr>";
  if (!facts.length){ const tr = el("tr"); const td = el("td","muted","No facts practiced yet."); td.colSpan=4; tr.appendChild(td); t.appendChild(tr); return t; }
  facts.sort((a,b) => (state.mastery[a].box - state.mastery[b].box) || (b.includes("-") - a.includes("-")));
  const wrap = el("div", "scroll-x");
  for (const f of facts){
    const m = state.mastery[f];
    const tr = el("tr");
    tr.innerHTML = `<td><b>${f}</b></td>`
      + `<td><span class="box-chip b${m.box}">${m.box}</span></td>`
      + `<td>${m.attempts}</td>`
      + `<td>${m.attempts ? Math.round(100*m.correct/m.attempts)+'%' : '–'}</td>`;
    t.appendChild(tr);

function copyAnalysisPrompt(){
  const dump = buildResultsDump();
  const summary = quickSummaryText(dump);
  const text = summary + "\n\n" + ANALYSIS_INSTRUCTIONS + JSON.stringify(dump);
  const done = () => toast("Analysis prompt copied — paste into ChatGPT or Claude.");
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else fallbackCopy(text, done);
}
function quickSummaryText(dump){
  const ff = dump.problems;
  const ft = ff.filter(r => r.correctFirstTry).length;
  const pct = ff.length ? Math.round(100*ft/ff.length) : 0;
  return `# Math Connections results for ${dump.meta.child}\n`
    + `Problems: ${ff.length} · First-try: ${pct}% · Sessions: ${dump.sessions.length}\n`
    + `Recommendation (built-in): ${generateRecommendation()}`;
}
function fallbackCopy(text, done){
  const ta = el("textarea"); ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); done(); } catch(e){ toast("Copy failed — use Export instead.", true); }

}

/* =========================================================================
   14. SELF-TESTS  (run in console:  runSelfTests()  )
   ========================================================================= */
function runSelfTests(){
  let pass = 0, fail = 0;
  const ok = (cond, msg) => { if (cond) pass++; else { fail++; console.error("FAIL:", msg); } };

  // canonical family id
  ok(canonFamilyId(5,3) === canonFamilyId(3,5), "canonFamilyId order-independent");
  ok(canonFamilyId(3,5) === "3+5=8", "canonFamilyId format");
  ok(familyIdForFact("8-3") === "3+5=8" && familyIdForFact("5+3") === "3+5=8", "familyIdForFact maps both operations");

  // family generation in range
  const fams = familiesInRange({ numberRange: { max: 10 } });
  ok(fams.every(f => f.a <= f.b && f.a + f.b === f.whole && f.whole <= 10 && f.a >= 1), "families valid & in range");

  const defaultPlan = buildSessionTypePlan(DEFAULT_CONFIG);
  const planCounts = Object.fromEntries(PROBLEM_TYPES.map(t => [t, defaultPlan.filter(x => x === t).length]));
  ok(defaultPlan.length === 6 &&
    defaultPlan[0] === "PICTURE_FAMILY" &&
    defaultPlan[1] === "PICTURE_FAMILY" &&
    planCounts.ADD_TO_SUB === 1 &&
    planCounts.COMPANION === 1 &&
    planCounts.NOT_FAMILY === 1 &&
    defaultPlan[5] === REVIEW_SLOT,
    "default session plan is ordered picture, picture, add-to-sub, companion, not-family, review");
  const longPlan = buildSessionTypePlan(Object.assign({}, DEFAULT_CONFIG, { sessionLength: 9 }));
  ok(longPlan.length === 9 && longPlan.every(Boolean) && longPlan.filter(x => x === REVIEW_SLOT).length >= 2,
    "extended default session plan remains explicit and ordered");

  // problem generation invariants (200 iters across structural + arithmetic types)
  const savedCfg = state.config, savedLast = state.lastKey;
  for (let i = 0; i < 200; i++){
    const p = generateFactFamilyProblem();
    const familyGood = p.a <= p.b && p.a + p.b === p.whole && p.whole <= p.range && Array.isArray(p.fields) && p.fields.length > 0;
    let shapeGood = false;
    if (isStructuralType(p.problemType)){
      const structureFieldsGood = p.fields.every(f => (f.operation === "structure" || f.operation === "count" ||
          f.operation === "addition" || f.operation === "subtraction") && f.tracksMastery === false);
      if (p.problemType === "PICTURE_FAMILY"){
        const stageRowIds = new Set((p.pictureStages || []).flatMap(stage => stage.rowIds || []));
        shapeGood = p.visual && p.constructRows && p.constructRows.length >= 2 &&
          p.constructRows.every(row => stageRowIds.has(row.id) &&
            (row.skill === "pictureCount" ||
              (row.skill === "pictureAddition" && row.expected[0] + row.expected[1] === row.expected[2] && row.expected[2] === p.whole) ||
              (row.skill === "pictureSubtraction" && row.expected[0] === p.whole && row.expected[0] - row.expected[1] === row.expected[2]))) &&
          structureFieldsGood;
      } else if (p.constructRows){
        shapeGood = p.constructRows.every(row => row.expected[0] === p.whole &&
          [p.a, p.b].includes(row.expected[1]) && [p.a, p.b].includes(row.expected[2]) &&
          row.expected[1] !== row.expected[2] && row.expected[1] + row.expected[2] === p.whole) && structureFieldsGood;
      } else if (p.choiceOptions){
        shapeGood = p.choiceOptions.filter(o => o.isCorrect).length === 1 && structureFieldsGood;
      }
    } else {
      shapeGood = p.fields.every(f => Number.isInteger(f.expected) && f.expected >= 0 && f.expected <= p.range &&
        (f.fact === `${p.a}+${p.b}` || f.fact === `${p.whole}-${p.a}` || f.fact === `${p.whole}-${p.b}`));
    }
    ok(familyGood && shapeGood, "generated problem shape is valid");
    if (!(familyGood && shapeGood)){ console.error("bad problem", p); break; }
  }

  // validateConfig: example ok
  const ex = validateConfig({ numberRange:{max:10}, sessionLength:6, emphasizeFacts:["10-7"], problemTypeMix:{ADD:1,SUB1:1,SUB2:1,CONNECT:1} });
  ok(ex.ok && ex.config.sessionLength === 6 && Math.abs(Object.values(ex.config.problemTypeMix).reduce((a,b)=>a+b,0) - 1) < 1e-9, "validateConfig normalizes mix");

  // SUB problems require both solving the subtraction and matching the addition.
  const subCfg = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  subCfg.problemTypeMix = { ADD:0, SUB1:1, SUB2:0, CONNECT:0 };
  state.config = subCfg;
  const subProblem = generateFactFamilyProblem();
  ok(subProblem.problemType === "SUB1" && subProblem.fields.some(f => f.operation === "subtraction") &&
    subProblem.fields.some(f => f.operation === "addition"), "SUB problem includes subtraction and matching addition blanks");
  state.config = savedCfg;

  // Deficit classifier finds the gap type, not just the weak number.
  const transferMiss = {
    mode:"factFamily", problemType:"ADD", factFamilyId:"3+5=8", correctFirstTry:false, attempts:1,
    answers:[
      { id:"sum", fact:"3+5", operation:"addition", correctAnswer:8, childAnswer:8, correctFirstTry:true },
      { id:"subA", fact:"8-3", operation:"subtraction", correctAnswer:5, childAnswer:4, correctFirstTry:false },
    ],
  };
  const signals = classifyDeficitSignals(transferMiss).map(s => s.id);
  ok(signals.includes("addToSubTransfer"), "classifies addition-to-subtraction transfer miss");
  const focus = derivePracticeFocus([transferMiss, transferMiss, transferMiss, transferMiss]);
  ok(focus.id === "addToSubTransfer" && focus.targetFamilies.includes("3+5=8"), "practice focus targets transfer gap family");

  // Structural errors: true arithmetic can still be the wrong family.
  const structuralMiss = {
    mode:"factFamily", problemType:"COMPANION", factFamilyId:"2+7=9", correctFirstTry:false, attempts:1,
    structuralErrorCodes:["PART_MINUS_PART"],
  };
  const structuralSignals = classifyDeficitSignals(structuralMiss).map(s => s.id);
  ok(structuralSignals.includes("wholeFirst"), "part-minus-part routes to whole-first focus");

  const generatedPicture = generateFactFamilyProblem("PICTURE_FAMILY", { scaffoldLevel: 1, familyOverride: "3+4=7" });
  ok(generatedPicture.fields.some(f => f.skill === "countFirstGroup" && f.representation === "picture") &&
    generatedPicture.fields.some(f => f.skill === "pictureToAddition" && f.representation === "picture") &&
    generatedPicture.fields.some(f => f.skill === "pictureToSubtraction" && f.representation === "picture"),
    "PICTURE_FAMILY fields expose separate skill and representation metadata");

  const pictureBase = {
    problemType: "PICTURE_FAMILY",
    a: 3,
    b: 4,
    whole: 7,
    fields: [],
  };
  const pictureAdditionProblem = Object.assign({}, pictureBase, {
    constructRows: [
      { id: "pictureAdd", fieldIds: ["pa", "pb", "pw"], expected: [3, 4, 7], skill: "pictureAddition" },
    ],
  });
  const reversedPictureAdd = [
    { id: "pa", submitted: 4 },
    { id: "pb", submitted: 3 },
    { id: "pw", submitted: 7 },
  ];
  applyConstructRowGrades(pictureAdditionProblem, reversedPictureAdd);
  ok(reversedPictureAdd.every(r => r.isCorrect), "PICTURE_FAMILY addition accepts either part order");
  const wrongPictureSum = [
    { id: "pa", submitted: 3 },
    { id: "pb", submitted: 4 },
    { id: "pw", submitted: 6 },
  ];
  ok(structuralErrorsForProblem(pictureAdditionProblem, wrongPictureSum).includes("PICTURE_ADDITION_ARITHMETIC_ERROR"),
    "PICTURE_FAMILY classifies correct parts with wrong sum as addition arithmetic");
  ok(structuralFeedback(pictureAdditionProblem, ["PICTURE_ADDITION_ARITHMETIC_ERROR"]).includes("addition total"),
    "PICTURE_FAMILY gives addition-specific feedback for wrong picture sum");

  const pictureSubProblem = Object.assign({}, pictureBase, {
    constructRows: [
      { id: "pictureSub", fieldIds: ["sw", "ss", "sd"], expected: [7, 3, 4], skill: "pictureSubtraction" },
    ],
  });
  const partMinusPartRows = [
    { id: "sw", submitted: 4 },
    { id: "ss", submitted: 3 },
    { id: "sd", submitted: 1 },
  ];
  ok(structuralErrorsForProblem(pictureSubProblem, partMinusPartRows).includes("PART_MINUS_PART"),
    "PICTURE_FAMILY flags true part-minus-part subtraction separately");
  const pictureArithmeticRows = [
    { id: "sw", submitted: 7 },
    { id: "ss", submitted: 3 },
    { id: "sd", submitted: 3 },
  ];
  ok(structuralErrorsForProblem(pictureSubProblem, pictureArithmeticRows).includes("ARITHMETIC_ERROR"),
    "PICTURE_FAMILY flags whole-first wrong remainder as arithmetic error");
  ok(focusForErrorCode("PICTURE_WHOLE_COUNT_ERROR") === "pictureToEquation",
    "picture counting errors route to picture-to-equation focus");

  const addToSubProblem = {
    problemType: "ADD_TO_SUB",
    a: 1,
    b: 4,
    whole: 5,
    constructRows: [
      { fieldIds: ["r1w", "r1s", "r1d"], expected: [5, 1, 4], skill: "additionToSubtraction" },
      { fieldIds: ["r2w", "r2s", "r2d"], expected: [5, 4, 1], skill: "additionToSubtraction" },
    ],
  };
  const reversedRows = [
    { id: "r1w", submitted: 5 }, { id: "r1s", submitted: 4 }, { id: "r1d", submitted: 1 },
    { id: "r2w", submitted: 5 }, { id: "r2s", submitted: 1 }, { id: "r2d", submitted: 4 },
  ];
  applyConstructRowGrades(addToSubProblem, reversedRows);
  ok(reversedRows.every(r => r.isCorrect), "ADD_TO_SUB accepts both valid subtraction rows in either order");
  ok(structuralFamilyCorrect(addToSubProblem, reversedRows) === true, "reversed ADD_TO_SUB rows still count as family-correct");

  const duplicateRows = [
    { id: "r1w", submitted: 5 }, { id: "r1s", submitted: 1 }, { id: "r1d", submitted: 4 },
    { id: "r2w", submitted: 5 }, { id: "r2s", submitted: 1 }, { id: "r2d", submitted: 4 },
  ];
  applyConstructRowGrades(addToSubProblem, duplicateRows);
  ok(!duplicateRows.every(r => r.isCorrect) && structuralErrorsForProblem(addToSubProblem, duplicateRows).includes("DUPLICATE_SUBTRACTION"),
    "ADD_TO_SUB rejects duplicate use of the same subtraction fact");

  const arithmeticProblem = {
    problemType: "COMPANION",
    a: 2,
    b: 7,
    whole: 9,
    constructRows: [
      { fieldIds: ["cw", "cs", "cd"], expected: [9, 7, 2], skill: "companionSubtraction" },
    ],
  };
  const arithmeticRows = [
    { id: "cw", submitted: 9 },
    { id: "cs", submitted: 2 },
    { id: "cd", submitted: 5 },
  ];
  const arithmeticErrors = structuralErrorsForProblem(arithmeticProblem, arithmeticRows);
  ok(arithmeticErrors.includes("ARITHMETIC_ERROR"), "wrong subtraction with the right whole and parts is an arithmetic error");
  ok(!arithmeticErrors.includes("PARTS_NOT_SWITCHED") && !arithmeticErrors.includes("WRONG_PART_POSITION"),
    "arithmetic errors are not misclassified as part-switching errors");

  const savedProblemForPictureStages = state.problem;
  const savedViewForPictureStages = state.view;
  const savedScreenForPictureStages = state.screen;
  const savedQuerySelectorForPictureStages = document.querySelector;
  const stagedProblem = generateFactFamilyProblem("PICTURE_FAMILY", { scaffoldLevel: 1, familyOverride: "3+4=7" });
  const stagedAnswers = {};
  document.querySelector = (selector) => {
    const m = String(selector).match(/data-answer-id="([^"]+)"/);
    return { value: m ? (stagedAnswers[m[1]] || "") : "" };

  state.problem = stagedProblem;
  state.screen = "home";
  state.view = {

    firstAnswer: null,

    startedAt: Date.now(),
  };
  Object.assign(stagedAnswers, { picCountA: "2", picCountB: "4", picCountWhole: "7" });
  checkPictureFamily();
  checkPictureFamily();
  Object.assign(stagedAnswers, { picCountA: "3", picCountB: "4", picCountWhole: "7" });
  checkPictureFamily();
  Object.assign(stagedAnswers, { picAddLeft: "3", picAddRight: "4", picAddWhole: "6" });
  checkPictureFamily();
  ok(state.view.pictureStageIndex === 1 && !state.view.solved &&
    state.view.hintSequence.includes("addition:conceptualFeedback") &&

  document.querySelector = savedQuerySelectorForPictureStages;
  state.problem = savedProblemForPictureStages;

  const savedViewForChoice = state.view;

  const nextChoiceGrid = renderChoiceOptions({

  ok(!state.view.fieldResults.choice && state.view.feedback === null,
    "changing a choice after a wrong check clears stale feedback");
  state.view = savedViewForChoice;

  const compCfg = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  compCfg.problemTypeMix = { COMPANION:1, ADD_TO_SUB:0, NOT_FAMILY:0, WHOLE_FIRST:0, ADD:0, SUB1:0, SUB2:0, CONNECT:0 };
  state.config = compCfg;
  const compProblem = generateFactFamilyProblem();
  ok(compProblem.problemType === "COMPANION" && compProblem.constructRows && compProblem.constructRows.length === 1,
    "companion mode builds one matching subtraction row");
  state.config = savedCfg;

  // validateConfig: junk never throws, clamps
  const junk = [null, "{", "[]", 42, {numberRange:{max:9999}}, {sessionLength:-5}, {emphasizeFacts:"nope"}, {emphasizeFamilies:["bad","2+3=5"]}, {ttsRate:99}];
  let threw = false;
  for (const j of junk){ try { const r = validateConfig(j); if (r.ok){ ok(r.config.numberRange.max <= 20 && r.config.numberRange.max >= 5, "clamp range"); ok(r.config.sessionLength >= 3, "clamp session"); ok(clamp(r.config.ttsRate,0.6,1.4) === r.config.ttsRate, "clamp tts"); } } catch(e){ threw = true; } }
  ok(!threw, "validateConfig never throws on junk");
  const famDrop = validateConfig({emphasizeFamilies:["bad","2+3=5"]});
  ok(famDrop.config.emphasizeFamilies.length === 1 && famDrop.config.emphasizeFamilies[0] === "2+3=5", "drops malformed family, keeps good");
  const impossibleDrop = validateConfig({emphasizeFamilies:["2+3=999"], emphasizeFacts:["99-4"]});
  ok(impossibleDrop.config.emphasizeFamilies.length === 0 && impossibleDrop.config.emphasizeFacts.length === 0, "drops impossible families and out-of-range facts");

  // mastery promote/demote stays in 1..5
  const savedMastery = state.mastery; state.mastery = {};
  const sc = state.config; state.config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  // streakToMaster=3 -> 1 box per 3 correct; 15 correct guarantees the box-5 cap.
  for (let i = 0; i < 15; i++) factMasteryUpdate("3+5", true);
  ok(state.mastery["3+5"].box === 5, "promotes to box 5 and caps");
  for (let i = 0; i < 10; i++) factMasteryUpdate("3+5", false);
  ok(state.mastery["3+5"].box === 1, "demotes to box 1 and floors");
  state.mastery = savedMastery; state.config = sc;

  // weighted selection avoids the avoid-list
  const pool = familiesInRange({ numberRange:{max:10} });
  const cfg2 = JSON.parse(JSON.stringify(DEFAULT_CONFIG)); cfg2.avoidFamilies = pool.slice(0,5).map(f=>f.id);
  let avoidedHit = false;
  for (let i = 0; i < 300; i++){ const f = selectWeightedFamily(pool, "ADD", cfg2); if (cfg2.avoidFamilies.includes(f.id)) { avoidedHit = true; break; } }
  ok(!avoidedHit, "selectWeightedFamily honors avoid list");

  state.config = savedCfg; state.lastKey = savedLast;
  persistMastery(); persistConfig();          // flush real state back (tests mutate then restore)
  console.log(`%cSelf-tests: ${pass} passed, ${fail} failed`, `color:${fail?'#b91c1c':'#15803d'};font-weight:bold`);
  return { pass, fail };
}
window.runSelfTests = runSelfTests;

/* =========================================================================
   15. BOOT
   ========================================================================= */
function boot(){
  // sync sound setting name (older field) -> speech
  if (state.settings.speech == null) state.settings.speech = true;
  render();
  if (location.hash === "#test") setTimeout(runSelfTests, 300);
}
boot();
</script>
